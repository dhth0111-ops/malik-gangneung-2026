<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f6ea8"><title>Malik Trip</title><link rel="manifest" href="./manifest.json"><link rel="apple-touch-icon" href="./icon-192.png"><style>
:root{--sea:#0f6ea8;--sea2:#1da1d2;--foam:#eef9ff;--ink:#163042;--muted:#688091;--card:#fff;--line:#d7ebf5}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;background:linear-gradient(#dff5ff,#f7fcff 45%,#eef8fc);color:var(--ink);min-height:100vh}header{padding:22px 18px 30px;background:linear-gradient(135deg,var(--sea),var(--sea2));color:#fff;border-radius:0 0 28px 28px;box-shadow:0 8px 24px #0f6ea838}.brand{display:flex;align-items:center;gap:12px}.logo{width:48px;height:48px;border-radius:15px;background:#fff;color:var(--sea);display:grid;place-items:center;font-size:26px}h1{font-size:24px;margin:0}.sub{opacity:.9;margin-top:4px;font-size:14px}main{padding:16px 14px 94px;max-width:760px;margin:auto}.hero,.card{background:#fffffff2;border:1px solid var(--line);border-radius:20px;padding:18px;margin:12px 0;box-shadow:0 8px 22px #285e7614}.hero{margin-top:-18px}.row{display:flex;gap:8px;flex-wrap:wrap}.pill{background:#e8f7ff;border:1px solid #cbeeff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800}.day-tabs{display:flex;gap:8px;overflow:auto}.day-tabs button{border:0;background:#dff3fb;color:var(--sea);font-weight:800;border-radius:999px;padding:9px 13px}.day-tabs button.active{background:var(--sea);color:#fff}.item{display:grid;grid-template-columns:58px 1fr auto;gap:10px;padding:12px 0;border-bottom:1px dashed var(--line)}.time{font-weight:900;color:var(--sea);font-size:13px;line-height:1.35;white-space:normal;word-break:keep-all}.title{font-weight:800;line-height:1.4;word-break:keep-all}.detail,.small{font-size:13px;color:var(--muted);margin-top:4px}.noteInput,.field{width:100%;margin-top:8px;border:1px solid var(--line);border-radius:10px;padding:9px;background:#fbfeff;font:inherit}.check{width:24px;height:24px}.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}button,.btn{border:0;border-radius:12px;padding:10px 12px;font-weight:800;background:var(--sea);color:#fff;text-decoration:none}.secondary{background:#e8f7ff!important;color:var(--sea)!important;border:1px solid #c7eaf8!important}.danger{background:#ffe8e8!important;color:#a33!important}.addbox{display:none;margin-top:10px;padding:12px;border-radius:14px;background:#f1fbff}.addbox.show{display:block}.bottom{position:fixed;left:0;right:0;bottom:0;background:#fffffff5;display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}.bottom button{background:none;color:#607789;border-radius:0;padding:10px 4px;font-size:11px}.bottom button.active{color:var(--sea)}.icon{display:block;font-size:21px}.section{display:none}.section.active{display:block}.checkrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed var(--line)}.checkrow input{width:22px;height:22px}textarea{min-height:110px}
</style></head><body><header><div class="brand"><div class="logo">🌊</div><div><h1>Malik Trip</h1><div class="sub">여행을 한 곳에, 바다처럼 시원하게</div></div></div></header><main>
<section id="home" class="section active"><div class="hero"><div class="small">현재 여행</div><h2>말릭존슨강릉2026</h2><div class="row"><span class="pill" id="dday">D-Day</span><span class="pill">2026.07.17~07.19</span></div></div><div class="card"><h3>다음 일정</h3><div id="nextSchedule" class="small"></div></div><div class="card"><h3>🚄 왕복 KTX</h3><div>05:33 상봉 → 07:03 강릉</div><div>16:45 강릉 → 18:16 상봉</div></div><div class="card"><h3>🏨 세인트존스 호텔</h3><div>체크인 7/17 14:00 · 체크아웃 7/19 11:00</div><div>인피니티풀 7/17 15:00~16:30 · 7/18 08:00~09:30</div></div></section>
<section id="schedule" class="section"><div class="card"><h3>📅 일정</h3><div id="dayTabs" class="day-tabs"></div><div id="scheduleList"></div><div class="actions"><button onclick="toggleAdd('scheduleAdd')">＋ 일정 추가</button></div><div id="scheduleAdd" class="addbox"><select id="addDate" class="field"><option value="2026-07-17">7/17</option><option value="2026-07-18">7/18</option><option value="2026-07-19">7/19</option></select><input id="addTime" class="field" placeholder="시간"><input id="addTitle" class="field" placeholder="일정 이름"><input id="addDetail" class="field" placeholder="상세 내용"><button onclick="addSchedule()">저장</button></div></div></section>
<section id="places" class="section"><div id="placeList"></div><div class="card"><button onclick="toggleAdd('placeAdd')">＋ 장소 추가</button><div id="placeAdd" class="addbox"><input id="placeName" class="field" placeholder="장소명"><input id="placeAddress" class="field" placeholder="주소"><input id="placeMode" class="field" placeholder="이동수단"><button onclick="addPlace()">저장</button></div></div></section>
<section id="notes" class="section"><div class="card"><h3>📝 여행 메모</h3><textarea id="globalMemo" class="field" placeholder="자유롭게 적어두세요"></textarea><div class="small">자동 저장됩니다.</div></div></section>
<section id="packing" class="section"><div class="card"><h3>🎒 준비물</h3><div id="packingList"></div><button onclick="toggleAdd('packingAdd')">＋ 준비물 추가</button><div id="packingAdd" class="addbox"><input id="packingName" class="field" placeholder="준비물 이름"><button onclick="addPacking()">추가</button></div></div></section></main>
<nav class="bottom"><button class="active" data-tab="home"><span class="icon">🏠</span>홈</button><button data-tab="schedule"><span class="icon">📅</span>일정</button><button data-tab="places"><span class="icon">📍</span>장소</button><button data-tab="notes"><span class="icon">📝</span>메모</button><button data-tab="packing"><span class="icon">🎒</span>준비물</button></nav>
<script>const baseData={"schedule": {"2026-07-17": [{"time": "04:30", "title": "집 출발", "detail": "구리시 체육관로 45 → 상봉역 · 택시"}, {"time": "05:33", "title": "상봉역 출발", "detail": "KTX"}, {"time": "07:03", "title": "강릉역 도착", "detail": "동화가든까지 택시 이동"}, {"time": "07:20~08:20", "title": "동화가든 아점", "detail": "짬뽕순두부 · 강릉시 초당순두부길 77"}, {"time": "08:20~13:30", "title": "초당동·경포 자유시간", "detail": "산책 및 휴식"}, {"time": "14:00", "title": "세인트존스 얼리 체크인", "detail": "객실 입실"}, {"time": "15:00~16:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔"}, {"time": "17:00~18:00", "title": "엄지네포장마차 저녁", "detail": "꼬막비빔밥 · 강릉시 경강로2255번길 21"}, {"time": "18:00 이후", "title": "호텔 휴식", "detail": "자유시간"}], "2026-07-18": [{"time": "08:00~09:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔"}, {"time": "09:30~10:20", "title": "객실 정리 및 휴식", "detail": ""}, {"time": "10:30~11:30", "title": "팔도전복해물뚝배기 아점", "detail": "강릉시 해안로 1079 · 도보 이동"}, {"time": "11:30~16:30", "title": "경포대·경포해변 산책", "detail": "자유시간"}, {"time": "17:00~18:00", "title": "고성생선찜 저녁", "detail": "강릉시 성덕포남로 56"}, {"time": "18:00 이후", "title": "호텔 복귀 및 휴식", "detail": ""}], "2026-07-19": [{"time": "06:30~07:30", "title": "쓰리밀즈 조식", "detail": "세인트존스 호텔"}, {"time": "07:30~10:30", "title": "자유시간", "detail": "해변 산책 또는 객실 휴식"}, {"time": "11:00", "title": "세인트존스 체크아웃", "detail": ""}, {"time": "11:30~12:30", "title": "교동반점 점심", "detail": "강릉시 강릉대로 203 · 택시 이동"}, {"time": "12:40~15:30", "title": "강릉중앙시장 구경", "detail": "강릉시 금성로 21"}, {"time": "15:30~16:00", "title": "강릉역 이동", "detail": "택시"}, {"time": "16:45", "title": "강릉역 출발", "detail": "KTX"}, {"time": "18:16", "title": "상봉역 도착", "detail": "여행 종료"}]}, "places": [{"name": "동화가든", "address": "강원 강릉시 초당순두부길 77", "mode": "택시", "query": "동화가든 강릉"}, {"name": "엄지네포장마차", "address": "강원 강릉시 경강로2255번길 21", "mode": "택시", "query": "엄지네포장마차 강릉"}, {"name": "팔도전복해물뚝배기", "address": "강원 강릉시 해안로 1079", "mode": "도보", "query": "팔도전복해물뚝배기 강릉"}, {"name": "고성생선찜", "address": "강원 강릉시 성덕포남로 56", "mode": "택시", "query": "고성생선찜 강릉"}, {"name": "교동반점", "address": "강원 강릉시 강릉대로 203", "mode": "택시", "query": "교동반점 강릉"}, {"name": "강릉중앙시장", "address": "강원 강릉시 금성로 21", "mode": "도보", "query": "강릉중앙시장"}]};const initialPacking=['신분증','KTX 승차권','수영복','슬리퍼','충전기','보조배터리','이어폰','선크림'];let data=JSON.parse(localStorage.getItem('malikTripData')||'null')||baseData;let packing=JSON.parse(localStorage.getItem('malikPacking')||'null')||initialPacking.map(name=>({name,done:false}));let currentDate='2026-07-17';function save(){localStorage.setItem('malikTripData',JSON.stringify(data))}function savePacking(){localStorage.setItem('malikPacking',JSON.stringify(packing))}document.querySelectorAll('.bottom button').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.bottom button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(btn.dataset.tab).classList.add('active')});function toggleAdd(id){document.getElementById(id).classList.toggle('show')}function renderTabs(){dayTabs.innerHTML='';Object.keys(data.schedule).sort().forEach(date=>{const b=document.createElement('button');b.textContent=date.slice(5).replace('-','/');if(date===currentDate)b.classList.add('active');b.onclick=()=>{currentDate=date;renderTabs();renderSchedule()};dayTabs.appendChild(b)})}function renderSchedule(){scheduleList.innerHTML='';(data.schedule[currentDate]||[]).forEach((it,i)=>{const key=currentDate+'-'+i,done=localStorage.getItem('done:'+key)==='1',note=localStorage.getItem('note:'+key)||'';const el=document.createElement('div');el.className='item';el.innerHTML=`<div class="time">${it.time}</div><div><div class="title">${it.title}</div><div class="detail">${it.detail||''}</div><input class="noteInput" value="${note.replaceAll('"','&quot;')}" placeholder="이 일정 메모" oninput="localStorage.setItem('note:${key}',this.value)"><div class="actions"><button class="secondary" onclick="deleteSchedule(${i})">삭제</button></div></div><input class="check" type="checkbox" ${done?'checked':''} onchange="localStorage.setItem('done:${key}',this.checked?'1':'0')">`;scheduleList.appendChild(el)})}function addSchedule(){const date=addDate.value,time=addTime.value.trim(),title=addTitle.value.trim(),detail=addDetail.value.trim();if(!time||!title)return alert('시간과 일정 이름을 입력해주세요.');data.schedule[date].push({time,title,detail});save();currentDate=date;renderTabs();renderSchedule();addTime.value=addTitle.value=addDetail.value='';toggleAdd('scheduleAdd')}function deleteSchedule(i){if(confirm('삭제할까요?')){data.schedule[currentDate].splice(i,1);save();renderSchedule()}}function renderPlaces(){placeList.innerHTML='';data.places.forEach((p,i)=>{const q=encodeURIComponent(p.query||p.name+' '+p.address),el=document.createElement('div');el.className='card';el.innerHTML=`<h3>📍 ${p.name}</h3><div>${p.address}</div><div class="small">이동: ${p.mode||'미정'}</div><input class="noteInput" placeholder="이 장소 메모" value="${(localStorage.getItem('placeNote:'+i)||'').replaceAll('"','&quot;')}" oninput="localStorage.setItem('placeNote:${i}',this.value)"><div class="actions"><a class="btn" target="_blank" href="https://map.naver.com/p/search/${q}">지도 열기</a><button class="secondary" onclick="deletePlace(${i})">삭제</button></div>`;placeList.appendChild(el)})}function addPlace(){const name=placeName.value.trim(),address=placeAddress.value.trim(),mode=placeMode.value.trim();if(!name)return alert('장소명을 입력해주세요.');data.places.push({name,address,mode,query:name+' '+address});save();renderPlaces();placeName.value=placeAddress.value=placeMode.value='';toggleAdd('placeAdd')}function deletePlace(i){if(confirm('삭제할까요?')){data.places.splice(i,1);save();renderPlaces()}}function renderPacking(){packingList.innerHTML='';packing.forEach((p,i)=>{const r=document.createElement('div');r.className='checkrow';r.innerHTML=`<input type="checkbox" ${p.done?'checked':''} onchange="packing[${i}].done=this.checked;savePacking()"><div style="flex:1">${p.name}</div><button class="danger" onclick="deletePacking(${i})">삭제</button>`;packingList.appendChild(r)})}function addPacking(){const n=packingName.value.trim();if(!n)return;packing.push({name:n,done:false});savePacking();renderPacking();packingName.value='';toggleAdd('packingAdd')}function deletePacking(i){packing.splice(i,1);savePacking();renderPacking()}globalMemo.value=localStorage.getItem('globalMemo')||'';globalMemo.oninput=()=>localStorage.setItem('globalMemo',globalMemo.value);function calcDday(){const diff=Math.ceil((new Date('2026-07-17')-new Date())/86400000);dday.textContent=diff>0?'D-'+diff:diff===0?'D-Day':'여행 완료'}function nextItem(){const now=new Date();let found=null;Object.entries(data.schedule).sort().forEach(([date,items])=>items.forEach(it=>{const m=it.time.match(/^(\d{2}):(\d{2})/);if(!m)return;const dt=new Date(date+'T'+m[1]+':'+m[2]);if(dt>=now&&(!found||dt<found.dt))found={dt,it,date}}));nextSchedule.innerHTML=found?`<b>${found.date.slice(5).replace('-','/')} ${found.it.time} · ${found.it.title}</b><div class="detail">${found.it.detail||''}</div>`:'예정된 일정이 없습니다.'}renderTabs();renderSchedule();renderPlaces();renderPacking();calcDday();nextItem();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');</script></body></html>

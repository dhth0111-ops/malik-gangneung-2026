<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Malik Trip</title>
<link rel="manifest" href="./manifest.json">
<style>
:root{--navy:#0b2f68;--red:#ef2b2d;--blue:#2374e8;--yellow:#f5aa00;--green:#089955;--line:#dbe2ec;--muted:#6a7488;--bg:#f4f7fb}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;color:#10223b}
button,input,textarea,select{font:inherit}
.app{max-width:760px;margin:auto;background:#fff;min-height:100vh;padding-bottom:86px}
.top{padding:15px 18px 10px;text-align:center;position:relative;background:#fff}
.logo{font-size:34px;font-weight:800;font-style:italic;color:var(--navy);line-height:1}
.subtitle{font-size:16px;color:var(--navy);margin-top:6px}
.livebar{margin:0 14px;border:1px solid var(--line);border-radius:16px;padding:11px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(10,45,90,.06)}
.live{color:var(--green);font-weight:800} .dot{width:12px;height:12px;border-radius:50%;background:var(--green)} .updated{color:var(--muted);border-left:1px solid var(--line);padding-left:12px}
.users{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 14px;background:linear-gradient(#fff,#eef8ff)}
.user{border:1.5px solid;border-radius:16px;padding:10px;text-align:center;background:#fff;box-shadow:0 5px 14px rgba(0,0,0,.05)}
.user img{width:78px;height:78px;object-fit:cover;border-radius:50%;display:block;margin:auto}
.user b{display:block;font-size:19px;margin-top:6px} .user small{font-weight:800}
.user.apple{border-color:#ffc4c4;color:var(--red)} .user.kokko{border-color:#c9dbff;color:var(--blue)} .user.angel{border-color:#ffe3a0;color:var(--yellow)}
.hero{height:205px;background:url('./hero-sea.png') center/cover;position:relative;display:flex;align-items:flex-end;padding:22px;color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.25)}
.hero h2{font-size:27px;margin:0} .hero p{margin:5px 0 0;font-weight:700}
.quick{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:12px 14px}
.quick button{border:1px solid var(--line);border-radius:16px;background:#fff;padding:12px 4px;box-shadow:0 5px 14px rgba(0,0,0,.05);color:#111;font-weight:800}
.quick .ico{font-size:27px;display:block;margin-bottom:4px}
.panel{margin:12px 14px;border:1px solid var(--line);border-radius:18px;background:#fff;box-shadow:0 5px 16px rgba(0,0,0,.05);padding:14px}
.panel h3{margin:0 0 12px;font-size:20px;color:#0d2349} .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.days{display:flex;gap:8px} .days button{flex:1;border:0;border-radius:20px;padding:9px;background:#edf0f5;font-weight:800} .days button.active{background:var(--red);color:white}
.item{display:grid;grid-template-columns:88px minmax(0,1fr) 28px;gap:10px;padding:13px 0;border-bottom:1px solid #edf1f6;align-items:start}
.time{font-weight:900;color:var(--red);line-height:1.25;overflow-wrap:anywhere} .title{font-weight:900;font-size:16px} .detail{font-size:13px;color:var(--muted);margin-top:4px}
.item input[type=checkbox]{width:23px;height:23px}
.memo{width:100%;min-height:140px;resize:vertical;padding:12px;border:1px solid var(--line);border-radius:13px;margin-top:8px;background:#fbfdff}
.meta{font-size:11px;color:var(--muted);margin-top:5px}
.btn{border:0;border-radius:12px;background:var(--navy);color:#fff;padding:10px 13px;font-weight:800} .btn.red{background:var(--red)} .btn.light{background:#edf4ff;color:var(--navy)} .btn.danger{background:#ffe9e9;color:#9b2222}
.card{padding:12px;border:1px solid var(--line);border-radius:14px;margin:10px 0}
.expense-total{font-size:28px;font-weight:900;color:var(--red)}
.fields input,.fields select,.fields textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;margin:5px 0}
.section{display:none} .section.active{display:block}
.bottom{position:fixed;left:0;right:0;bottom:0;max-width:760px;margin:auto;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);z-index:30;padding-bottom:env(safe-area-inset-bottom)}
.bottom button{border:0;background:#fff;padding:9px 2px;font-size:11px;color:#445168} .bottom button.active{color:var(--red);font-weight:900} .bottom span{display:block;font-size:21px}
.modal{position:fixed;inset:0;background:rgba(0,23,45,.58);display:none;align-items:center;justify-content:center;padding:20px;z-index:100} .modal.show{display:flex}
.modalbox{width:min(460px,100%);background:#fff;border-radius:24px;padding:22px} .modalbox h2{margin:0 0 6px} .modalbox p{color:var(--muted)}
.choose{display:grid;grid-template-columns:64px 1fr auto;align-items:center;width:100%;margin:10px 0;padding:12px;border-radius:16px;border:2px solid var(--line);background:#fff;text-align:left} .choose img{width:54px;height:54px;border-radius:50%;object-fit:cover} .choose b{font-size:18px}
.status{padding:9px 12px;border-radius:12px;background:#fff5ce;color:#714e00;margin-top:10px;font-size:13px}
@media(max-width:600px){.quick{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:1fr}.users{gap:6px}.user img{width:64px;height:64px}.user b{font-size:16px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="logo">Malik Trip 🌊</div><div class="subtitle">강릉 여행 2026</div></header>
<div class="livebar"><span class="dot"></span><span class="live" id="liveText">연결 중</span><span class="updated" id="updatedText">마지막 업데이트 -</span></div>
<div class="users">
 <div class="user apple"><img src="./avatar-apple.png"><b>사과머리</b><small>빨강</small></div>
 <div class="user kokko"><img src="./avatar-kokko.png"><b>꼬꼬마</b><small>파랑</small></div>
 <div class="user angel"><img src="./avatar-angel.png"><b>아기천사</b><small>노랑</small></div>
</div>
<section class="hero"><div><h2>강릉에서의 소중한 시간</h2><p>함께 쓰고, 함께 기억해요</p></div></section>
<div class="quick">
 <button onclick="go('schedule')"><span class="ico">📅</span>일정</button>
 <button onclick="go('places')"><span class="ico">📍</span>장소</button>
 <button onclick="go('memo')"><span class="ico">📝</span>메모</button>
 <button onclick="go('packing')"><span class="ico">✅</span>준비물</button>
 <button onclick="go('expenses')"><span class="ico">💳</span>여행경비</button>
 <button onclick="go('more')"><span class="ico">•••</span>더보기</button>
</div>

<main>
<section id="home" class="section active">
 <div class="grid2">
  <div class="panel"><h3>오늘의 일정</h3><div class="days" id="homeDays"></div><div id="homeSchedule"></div></div>
  <div class="panel"><h3>최근 활동</h3><div id="activity"></div></div>
 </div>
 <div class="panel"><h3>여행경비 요약</h3><div class="expense-total" id="homeTotal">0원</div><div id="homeCats" class="detail"></div></div>
</section>

<section id="schedule" class="section"><div class="panel"><h3>일정</h3><div class="days" id="days"></div><div id="scheduleList"></div></div></section>
<section id="places" class="section"><div class="panel"><h3>장소</h3><div id="placeList"></div></div></section>
<section id="memo" class="section"><div class="panel"><h3>여행 메모</h3><textarea id="travelMemo" class="memo" style="min-height:280px" placeholder="세 명이 함께 보는 큰 메모장"></textarea><div id="memoMeta" class="meta"></div></div></section>
<section id="packing" class="section"><div class="panel"><h3>준비물</h3><div id="packingList"></div></div></section>
<section id="expenses" class="section">
 <div class="panel"><h3>여행경비</h3><div class="expense-total" id="total">0원</div><button class="btn red" onclick="toggleExpense()">지출 추가</button>
 <div id="expenseForm" class="fields" style="display:none;margin-top:10px"><input id="exDate" type="date"><select id="exCat"><option>식비</option><option>교통비</option><option>숙박비</option><option>쇼핑/간식</option><option>기타</option></select><input id="exTitle" placeholder="항목"><input id="exAmount" type="number" placeholder="금액"><textarea id="exMemo" placeholder="메모"></textarea><button class="btn" onclick="addExpense()">저장</button></div>
 <div id="expenseList"></div></div>
</section>
<section id="more" class="section"><div class="panel"><h3>공지</h3><textarea id="notice" class="memo" placeholder="세 명이 함께 보는 공지"></textarea><div id="noticeMeta" class="meta"></div></div><div class="panel"><h3>내 사용자</h3><button class="btn light" onclick="openPicker()">사용자 다시 선택</button></div></section>
</main>

<nav class="bottom">
<button class="active" data-tab="home" onclick="go('home')"><span>🏠</span>홈</button>
<button data-tab="schedule" onclick="go('schedule')"><span>📅</span>일정</button>
<button data-tab="places" onclick="go('places')"><span>📍</span>장소</button>
<button data-tab="memo" onclick="go('memo')"><span>📝</span>메모</button>
<button data-tab="expenses" onclick="go('expenses')"><span>💳</span>여행경비</button>
<button data-tab="more" onclick="go('more')"><span>•••</span>더보기</button>
</nav>
</div>

<div id="picker" class="modal"><div class="modalbox"><h2>사용자를 선택하세요</h2><p>이 휴대폰에서 사용할 이름입니다.</p>
<button class="choose" onclick="choose('사과머리')"><img src="./avatar-apple.png"><b>사과머리</b><span style="color:var(--red)">빨강</span></button>
<button class="choose" onclick="choose('꼬꼬마')"><img src="./avatar-kokko.png"><b>꼬꼬마</b><span style="color:var(--blue)">파랑</span></button>
<button class="choose" onclick="choose('아기천사')"><img src="./avatar-angel.png"><b>아기천사</b><span style="color:var(--yellow)">노랑</span></button>
</div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>
<script>
const seed={"tripName": "말릭존슨강릉2026", "notice": "", "schedule": {"2026-07-17": [{"time": "04:30", "title": "집 출발", "detail": "구리시 체육관로 45 → 상봉역 · 택시"}, {"time": "05:33", "title": "상봉역 출발", "detail": "KTX"}, {"time": "07:03", "title": "강릉역 도착", "detail": "동화가든까지 택시 이동"}, {"time": "07:20~08:20", "title": "동화가든 아점", "detail": "짬뽕순두부"}, {"time": "08:20~13:30", "title": "초당동·경포 자유시간", "detail": "산책 및 휴식"}, {"time": "14:00", "title": "세인트존스 호텔 체크인", "detail": "얼리 체크인"}, {"time": "15:00~16:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔"}, {"time": "17:00~18:00", "title": "엄지네포장마차 저녁", "detail": "꼬막비빔밥"}], "2026-07-18": [{"time": "08:00~09:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔"}, {"time": "10:30~11:30", "title": "팔도전복해물뚝배기 아점", "detail": "도보 이동"}, {"time": "11:30~16:30", "title": "경포해변 산책", "detail": "자유시간"}, {"time": "17:00~18:00", "title": "고성생선찜 저녁", "detail": "성덕포남로 56"}], "2026-07-19": [{"time": "06:30~07:30", "title": "쓰리밀즈 조식", "detail": "세인트존스 호텔"}, {"time": "11:00", "title": "체크아웃", "detail": "세인트존스 호텔"}, {"time": "11:30~12:30", "title": "교동반점 점심", "detail": "택시 이동"}, {"time": "12:40~15:30", "title": "강릉중앙시장", "detail": "구경 및 기념품"}, {"time": "16:45", "title": "강릉역 출발", "detail": "KTX"}, {"time": "18:16", "title": "상봉역 도착", "detail": "여행 종료"}]}, "places": [{"name": "동화가든", "address": "강원 강릉시 초당순두부길 77", "memo": ""}, {"name": "엄지네포장마차", "address": "강원 강릉시 경강로2255번길 21", "memo": ""}, {"name": "팔도전복해물뚝배기", "address": "강원 강릉시 해안로 1079", "memo": ""}, {"name": "고성생선찜", "address": "강원 강릉시 성덕포남로 56", "memo": ""}, {"name": "교동반점", "address": "강원 강릉시 강릉대로 203", "memo": ""}, {"name": "강릉중앙시장", "address": "강원 강릉시 금성로 21", "memo": ""}], "packing": [{"name": "신분증", "done": false, "by": "", "at": ""}, {"name": "KTX 승차권", "done": false, "by": "", "at": ""}, {"name": "수영복", "done": false, "by": "", "at": ""}, {"name": "슬리퍼", "done": false, "by": "", "at": ""}, {"name": "충전기", "done": false, "by": "", "at": ""}, {"name": "보조배터리", "done": false, "by": "", "at": ""}, {"name": "이어폰", "done": false, "by": "", "at": ""}, {"name": "선크림", "done": false, "by": "", "at": ""}], "memo": "", "expenses": [], "activity": [], "updatedAt": ""};
let state=seed, db=null, ref=null, day="2026-07-17", timer=null;
const $=id=>document.getElementById(id);
const me=()=>localStorage.getItem("malikTripUser")||"";
const now=()=>new Date().toLocaleString("ko-KR");
const avatar=n=>n==="사과머리"?"avatar-apple.png":n==="꼬꼬마"?"avatar-kokko.png":"avatar-angel.png";
function openPicker(){$("picker").classList.add("show")}
function choose(n){localStorage.setItem("malikTripUser",n);$("picker").classList.remove("show");log("사용자를 선택했습니다");save()}
function go(id){document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));$(id).classList.add("active");document.querySelectorAll(".bottom button").forEach(b=>b.classList.toggle("active",b.dataset.tab===id))}
function mark(obj){obj.by=me();obj.at=now();state.updatedAt=obj.at}
function log(text){state.activity=state.activity||[];state.activity.unshift({text,by:me(),at:now()});state.activity=state.activity.slice(0,30)}
function save(){clearTimeout(timer);timer=setTimeout(async()=>{if(ref)await ref.set(state);else localStorage.setItem("malikFallback",JSON.stringify(state));render()},250)}
async function init(){
 if(!me())openPicker();
 try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();ref=db.collection("sharedTrips").doc("gangneung-2026");ref.onSnapshot(async s=>{if(s.exists)state=s.data();else await ref.set(seed);$("liveText").textContent="실시간 연결됨";render()},e=>{$("liveText").textContent="연결 실패";console.error(e)})}catch(e){const f=localStorage.getItem("malikFallback");if(f)state=JSON.parse(f);$("liveText").textContent="이 기기에만 저장";render()}
}
function dayButtons(target,home=false){target.innerHTML="";Object.keys(state.schedule).forEach(d=>{let b=document.createElement("button");b.textContent=d.slice(5).replace("-","/");b.classList.toggle("active",d===day);b.onclick=()=>{day=d;render()};target.appendChild(b)})}
function renderSchedule(target,compact=false){target.innerHTML="";(state.schedule[day]||[]).forEach((it,i)=>{let e=document.createElement("div");e.className="item";e.innerHTML=`<div class="time">${it.time}</div><div><div class="title">${it.title}</div><div class="detail">${it.detail||""}</div>${compact?"":`<textarea class="memo" placeholder="일정 메모">${it.memo||""}</textarea><div class="meta">${it.by?it.by+" · "+it.at:""}</div>`}</div><input type="checkbox" ${it.done?"checked":""}>`;e.querySelector("input").onchange=x=>{it.done=x.target.checked;mark(it);log(it.title+" 완료 상태 변경");save()};let ta=e.querySelector("textarea");if(ta)ta.oninput=x=>{it.memo=x.target.value;mark(it);save()};target.appendChild(e)})}
function render(){
 $("updatedText").textContent="마지막 업데이트 "+(state.updatedAt||"-");
 dayButtons($("days"));dayButtons($("homeDays"));renderSchedule($("scheduleList"));renderSchedule($("homeSchedule"),true);
 $("activity").innerHTML=(state.activity||[]).slice(0,6).map(a=>`<div class="card" style="display:grid;grid-template-columns:42px 1fr"><img src="./${avatar(a.by)}" style="width:36px;height:36px;border-radius:50%;object-fit:cover"><div><b>${a.by||"사용자"}</b>가 ${a.text}<div class="meta">${a.at}</div></div></div>`).join("")||'<div class="detail">활동 없음</div>';
 $("placeList").innerHTML=state.places.map((p,i)=>`<div class="card"><b>${p.name}</b><div class="detail">${p.address}</div><textarea class="memo" data-place="${i}" placeholder="장소 메모">${p.memo||""}</textarea><div class="meta">${p.by?p.by+" · "+p.at:""}</div><a class="btn light" target="_blank" href="https://map.naver.com/p/search/${encodeURIComponent(p.name+" "+p.address)}">지도 열기</a></div>`).join("");
 document.querySelectorAll("[data-place]").forEach(t=>t.oninput=e=>{let p=state.places[+e.target.dataset.place];p.memo=e.target.value;mark(p);save()});
 $("travelMemo").value=state.memo||"";$("memoMeta").textContent=state.memoBy?state.memoBy+" · "+state.memoAt:"";
 $("packingList").innerHTML=state.packing.map((p,i)=>`<div class="card"><label><input type="checkbox" data-pack="${i}" ${p.done?"checked":""}> <b>${p.name}</b></label><div class="meta">${p.by?p.by+" · "+p.at:""}</div></div>`).join("");
 document.querySelectorAll("[data-pack]").forEach(c=>c.onchange=e=>{let p=state.packing[+e.target.dataset.pack];p.done=e.target.checked;mark(p);log(p.name+" 준비물 체크 변경");save()});
 renderExpenses();
 $("notice").value=state.notice||"";$("noticeMeta").textContent=state.noticeBy?state.noticeBy+" · "+state.noticeAt:"";
}
$("travelMemo").oninput=e=>{state.memo=e.target.value;state.memoBy=me();state.memoAt=now();state.updatedAt=state.memoAt;save()};
$("notice").oninput=e=>{state.notice=e.target.value;state.noticeBy=me();state.noticeAt=now();state.updatedAt=state.noticeAt;save()};
function toggleExpense(){$("expenseForm").style.display=$("expenseForm").style.display==="none"?"block":"none"}
function addExpense(){let x={date:$("exDate").value||new Date().toISOString().slice(0,10),category:$("exCat").value,title:$("exTitle").value.trim(),amount:Number($("exAmount").value),memo:$("exMemo").value.trim(),by:me(),at:now()};if(!x.title||!x.amount)return alert("항목과 금액을 입력하세요");state.expenses.push(x);state.updatedAt=x.at;log(x.title+" 경비 추가");$("expenseForm").style.display="none";save()}
function renderExpenses(){let total=0,cats={};$("expenseList").innerHTML=(state.expenses||[]).map((x,i)=>{total+=Number(x.amount)||0;cats[x.category]=(cats[x.category]||0)+Number(x.amount||0);return `<div class="card"><b>${x.category} · ${x.title}</b><div style="font-size:20px;font-weight:900">${Number(x.amount).toLocaleString()}원</div><div class="detail">${x.date} · ${x.memo||""}</div><div class="meta">${x.by} · ${x.at}</div><button class="btn danger" onclick="delExpense(${i})">삭제</button></div>`}).join("");$("total").textContent=total.toLocaleString()+"원";$("homeTotal").textContent=total.toLocaleString()+"원";$("homeCats").textContent=Object.entries(cats).map(([k,v])=>k+" "+v.toLocaleString()+"원").join(" · ")}
function delExpense(i){if(confirm("삭제할까요?")){let x=state.expenses[i];state.expenses.splice(i,1);log(x.title+" 경비 삭제");state.updatedAt=now();save()}}
init();if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js");
</script>
</body></html>

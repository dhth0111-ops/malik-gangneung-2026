<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E6FA8">
<title>Malik Trip</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root {
  --sea:#0e6fa8; --sea2:#22a8d8; --sky:#dff6ff; --foam:#f7fdff;
  --ink:#173246; --muted:#6e8797; --card:#ffffff; --line:#d9edf6;
  --danger:#aa3e3e; --shadow:0 8px 24px rgba(15, 91, 128, .10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;background:linear-gradient(180deg,var(--sky),#f9fdff 45%,#eef8fc);color:var(--ink);min-height:100vh}
button,input,textarea,select{font:inherit}
header{background:linear-gradient(135deg,var(--sea),var(--sea2));color:#fff;padding:22px 18px 34px;border-radius:0 0 28px 28px;box-shadow:0 10px 28px rgba(14,111,168,.24)}
.brand{display:flex;gap:12px;align-items:center}
.brandLogo{width:48px;height:48px;border-radius:15px;background:#fff;display:grid;place-items:center;font-size:26px;color:var(--sea);box-shadow:0 5px 18px rgba(0,0,0,.14)}
.brand h1{margin:0;font-size:24px;letter-spacing:-.4px}
.brand p{margin:4px 0 0;opacity:.92;font-size:13px}
main{max-width:760px;margin:auto;padding:14px 14px 96px}
.section{display:none}
.section.active{display:block}
.card{background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}
.hero{margin-top:-22px}
.card h2,.card h3{margin:0 0 10px}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;padding:8px 11px;border-radius:999px;background:#e8f8ff;border:1px solid #cdeef9;color:var(--sea);font-weight:800;font-size:12px}
.tripGrid{display:grid;grid-template-columns:1fr;gap:10px}
.tripTile{border:1px solid var(--line);background:#fff;border-radius:16px;padding:14px;text-align:left;color:var(--ink);box-shadow:0 5px 15px rgba(21,91,124,.07)}
.tripTile.active{outline:3px solid #bdeaff}
.dayTabs{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}
.dayTabs button{border:0;border-radius:999px;padding:9px 13px;background:#e7f6fc;color:var(--sea);font-weight:900;white-space:nowrap}
.dayTabs button.active{background:var(--sea);color:#fff}
.scheduleList{display:flex;flex-direction:column;gap:12px}
.scheduleItem{display:grid;grid-template-columns:92px minmax(0,1fr) 30px;gap:12px;align-items:start;padding:14px 0;border-bottom:1px dashed var(--line)}
.scheduleItem:last-child{border-bottom:0}
.time{font-weight:900;color:var(--sea);font-size:14px;line-height:1.35;word-break:keep-all;overflow-wrap:anywhere}
.eventTitle{font-weight:900;font-size:17px;line-height:1.35;word-break:keep-all}
.eventDetail{font-size:13px;color:var(--muted);margin-top:5px;line-height:1.45}
.check{width:24px;height:24px;margin-top:2px}
.noteInput{width:100%;margin-top:9px;padding:10px 11px;border:1px solid var(--line);border-radius:12px;background:#fbfeff}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn,button.primary{border:0;border-radius:12px;padding:10px 12px;background:var(--sea);color:white;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
button.secondary,.btn.secondary{background:#e9f8fe;color:var(--sea);border:1px solid #ccecf8}
button.danger{background:#ffecec;color:var(--danger);border:1px solid #ffd4d4}
.addPanel{display:none;margin-top:12px;padding:12px;border-radius:15px;background:#effaff;border:1px solid var(--line)}
.addPanel.show{display:block}
.field{width:100%;padding:11px;border:1px solid var(--line);border-radius:11px;margin:5px 0;background:white}
.placeCard{background:white;border:1px solid var(--line);border-radius:18px;padding:15px;margin:11px 0;box-shadow:var(--shadow)}
.placeCard h3{margin:0 0 8px}
.small{font-size:12px;color:var(--muted)}
.memoArea{min-height:120px}
.packRow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px dashed var(--line)}
.packRow input{width:22px;height:22px}
.packRow span{flex:1}
.fab{position:fixed;right:18px;bottom:88px;width:54px;height:54px;border-radius:50%;border:0;background:#ffb74d;color:#573300;font-size:28px;font-weight:900;box-shadow:0 10px 24px rgba(127,84,24,.25);z-index:30}
.quickMenu{position:fixed;right:18px;bottom:150px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px;box-shadow:var(--shadow);display:none;z-index:29}
.quickMenu.show{display:flex;flex-direction:column;gap:6px}
.quickMenu button{border:0;background:#eef9ff;color:var(--sea);padding:10px 12px;border-radius:10px;font-weight:800;text-align:left}
.bottomNav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);z-index:25;padding-bottom:env(safe-area-inset-bottom)}
.bottomNav button{border:0;background:none;color:#6e8190;padding:9px 3px 10px;font-size:11px;font-weight:800}
.bottomNav button.active{color:var(--sea)}
.navIcon{display:block;font-size:21px;margin-bottom:2px}
.empty{padding:24px;text-align:center;color:var(--muted)}
@media (max-width:390px){
  .scheduleItem{grid-template-columns:84px minmax(0,1fr) 28px;gap:9px}
  .time{font-size:13px}
  .eventTitle{font-size:16px}
}
@media print{
  header{border-radius:0}
  .bottomNav,.fab,.quickMenu,.actions,.addPanel{display:none!important}
  body{background:white}
  main{padding-bottom:10px}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="brandLogo">🌊</div>
    <div>
      <h1>Malik Trip</h1>
      <p>여행 하나, 앱 하나.</p>
    </div>
  </div>
</header>

<main>
<section id="home" class="section active">
  <div class="card hero">
    <div class="small">현재 여행</div>
    <h2 id="homeTripName">말릭존슨강릉2026</h2>
    <div class="pills">
      <span class="pill" id="dday">D-Day 계산 중</span>
      <span class="pill" id="tripDates"></span>
    </div>
  </div>
  <div class="card">
    <h3>다음 일정</h3>
    <div id="nextSchedule" class="small">불러오는 중...</div>
  </div>
  <div class="card">
    <h3>여행 목록</h3>
    <div id="tripList" class="tripGrid"></div>
    <div class="actions"><button class="primary" onclick="togglePanel('tripAdd')">＋ 새 여행</button></div>
    <div id="tripAdd" class="addPanel">
      <input id="newTripName" class="field" placeholder="여행 이름">
      <input id="newTripStart" class="field" type="date">
      <input id="newTripEnd" class="field" type="date">
      <button class="primary" onclick="addTrip()">여행 만들기</button>
    </div>
  </div>
  <div class="card">
    <h3>🚄 교통</h3>
    <div id="transportInfo"></div>
  </div>
  <div class="card">
    <h3>🏨 호텔</h3>
    <div id="hotelInfo"></div>
  </div>
</section>

<section id="schedule" class="section">
  <div class="card">
    <h3>📅 일정</h3>
    <div id="dayTabs" class="dayTabs"></div>
    <div id="scheduleList" class="scheduleList"></div>
    <div class="actions"><button class="primary" onclick="togglePanel('scheduleAdd')">＋ 일정 추가</button></div>
    <div id="scheduleAdd" class="addPanel">
      <select id="addDate" class="field"></select>
      <input id="addTime" class="field" placeholder="시간 예: 13:00~14:00">
      <input id="addTitle" class="field" placeholder="일정 이름">
      <input id="addDetail" class="field" placeholder="상세 내용">
      <button class="primary" onclick="addSchedule()">저장</button>
    </div>
  </div>
</section>

<section id="places" class="section">
  <div id="placeList"></div>
  <div class="card">
    <div class="actions"><button class="primary" onclick="togglePanel('placeAdd')">＋ 장소 추가</button></div>
    <div id="placeAdd" class="addPanel">
      <input id="placeName" class="field" placeholder="장소명">
      <input id="placeAddress" class="field" placeholder="주소">
      <input id="placeMode" class="field" placeholder="이동수단 예: 도보 / 택시">
      <button class="primary" onclick="addPlace()">저장</button>
    </div>
  </div>
</section>

<section id="notes" class="section">
  <div class="card">
    <h3>📝 여행 메모</h3>
    <textarea id="globalMemo" class="field memoArea" placeholder="여행 전체 메모를 적어두세요."></textarea>
    <div class="small">내용은 이 기기에 자동 저장됩니다.</div>
  </div>
</section>

<section id="packing" class="section">
  <div class="card">
    <h3>🎒 준비물</h3>
    <div id="packingList"></div>
    <div class="actions"><button class="primary" onclick="togglePanel('packingAdd')">＋ 준비물 추가</button></div>
    <div id="packingAdd" class="addPanel">
      <input id="packingName" class="field" placeholder="준비물 이름">
      <button class="primary" onclick="addPacking()">추가</button>
    </div>
  </div>
</section>
</main>

<button class="fab" aria-label="빠른 추가" onclick="toggleQuick()">＋</button>
<div id="quickMenu" class="quickMenu">
  <button onclick="goAndOpen('schedule','scheduleAdd')">일정 추가</button>
  <button onclick="goAndOpen('places','placeAdd')">장소 추가</button>
  <button onclick="goAndOpen('packing','packingAdd')">준비물 추가</button>
  <button onclick="goTab('notes')">메모 열기</button>
  <button onclick="goAndOpen('home','tripAdd')">여행 추가</button>
</div>

<nav class="bottomNav">
  <button class="active" data-tab="home"><span class="navIcon">🏠</span>홈</button>
  <button data-tab="schedule"><span class="navIcon">📅</span>일정</button>
  <button data-tab="places"><span class="navIcon">📍</span>장소</button>
  <button data-tab="notes"><span class="navIcon">📝</span>메모</button>
  <button data-tab="packing"><span class="navIcon">🎒</span>준비물</button>
</nav>

<script>
const seed = {"trips": [{"id": "gangneung-2026", "name": "말릭존슨강릉2026", "startDate": "2026-07-17", "endDate": "2026-07-19", "hotel": {"name": "세인트존스 호텔", "checkIn": "2026-07-17 14:00", "checkOut": "2026-07-19 11:00", "pool": ["7/17 15:00~16:30", "7/18 08:00~09:30"]}, "transport": ["05:33 상봉 → 07:03 강릉", "16:45 강릉 → 18:16 상봉"], "schedule": {"2026-07-17": [{"time": "04:30", "title": "집 출발", "detail": "구리시 체육관로 45 → 상봉역 · 택시"}, {"time": "05:33", "title": "상봉역 출발", "detail": "KTX"}, {"time": "07:03", "title": "강릉역 도착", "detail": "동화가든까지 택시 이동"}, {"time": "07:20~08:20", "title": "동화가든 아점", "detail": "짬뽕순두부 · 강원 강릉시 초당순두부길 77"}, {"time": "08:20~13:30", "title": "초당동·경포 자유시간", "detail": "산책 및 휴식"}, {"time": "14:00", "title": "세인트존스 얼리 체크인", "detail": "객실 입실"}, {"time": "15:00~16:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔"}, {"time": "17:00~18:00", "title": "엄지네포장마차 저녁", "detail": "꼬막비빔밥 · 강원 강릉시 경강로2255번길 21"}, {"time": "18:00 이후", "title": "호텔 휴식", "detail": "자유시간"}], "2026-07-18": [{"time": "08:00~09:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔"}, {"time": "09:30~10:20", "title": "객실 정리 및 휴식", "detail": ""}, {"time": "10:30~11:30", "title": "팔도전복해물뚝배기 아점", "detail": "강원 강릉시 해안로 1079 · 도보 이동"}, {"time": "11:30~16:30", "title": "경포대·경포해변 산책", "detail": "자유시간"}, {"time": "17:00~18:00", "title": "고성생선찜 저녁", "detail": "강원 강릉시 성덕포남로 56"}, {"time": "18:00 이후", "title": "호텔 복귀 및 휴식", "detail": ""}], "2026-07-19": [{"time": "06:30~07:30", "title": "쓰리밀즈 조식", "detail": "세인트존스 호텔"}, {"time": "07:30~10:30", "title": "자유시간", "detail": "해변 산책 또는 객실 휴식"}, {"time": "11:00", "title": "세인트존스 체크아웃", "detail": ""}, {"time": "11:30~12:30", "title": "교동반점 점심", "detail": "강원 강릉시 강릉대로 203 · 택시 이동"}, {"time": "12:40~15:30", "title": "강릉중앙시장 구경", "detail": "강원 강릉시 금성로 21"}, {"time": "15:30~16:00", "title": "강릉역 이동", "detail": "택시"}, {"time": "16:45", "title": "강릉역 출발", "detail": "KTX"}, {"time": "18:16", "title": "상봉역 도착", "detail": "여행 종료"}]}, "places": [{"name": "동화가든", "address": "강원 강릉시 초당순두부길 77", "mode": "택시", "query": "동화가든 강릉"}, {"name": "엄지네포장마차", "address": "강원 강릉시 경강로2255번길 21", "mode": "택시", "query": "엄지네포장마차 강릉"}, {"name": "팔도전복해물뚝배기", "address": "강원 강릉시 해안로 1079", "mode": "도보", "query": "팔도전복해물뚝배기 강릉"}, {"name": "고성생선찜", "address": "강원 강릉시 성덕포남로 56", "mode": "택시", "query": "고성생선찜 강릉"}, {"name": "교동반점", "address": "강원 강릉시 강릉대로 203", "mode": "택시", "query": "교동반점 강릉"}, {"name": "강릉중앙시장", "address": "강원 강릉시 금성로 21", "mode": "도보", "query": "강릉중앙시장"}]}], "activeTripId": "gangneung-2026"};
let state = JSON.parse(localStorage.getItem("malikTripV2State") || "null") || seed;
let packing = JSON.parse(localStorage.getItem("malikTripV2Packing") || "null") ||
  ["신분증","KTX 승차권","수영복","슬리퍼","충전기","보조배터리","이어폰","선크림"].map(x=>({name:x,done:false}));
let currentDate = null;

const $ = id => document.getElementById(id);
function saveState(){localStorage.setItem("malikTripV2State", JSON.stringify(state));}
function savePacking(){localStorage.setItem("malikTripV2Packing", JSON.stringify(packing));}
function activeTrip(){return state.trips.find(t=>t.id===state.activeTripId) || state.trips[0];}
function fmtDate(d){return d ? d.replaceAll("-",".") : "";}
function togglePanel(id){$ (id).classList.toggle("show");}
function toggleQuick(){$("quickMenu").classList.toggle("show");}

function goTab(tab){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  $(tab).classList.add("active");
  document.querySelectorAll(".bottomNav button").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  $("quickMenu").classList.remove("show");
}
function goAndOpen(tab,panel){goTab(tab);$(panel).classList.add("show");}
document.querySelectorAll(".bottomNav button").forEach(b=>b.onclick=()=>goTab(b.dataset.tab));

function renderHome(){
  const t=activeTrip();
  $("homeTripName").textContent=t.name;
  $("tripDates").textContent=`${fmtDate(t.startDate)}~${fmtDate(t.endDate)}`;
  const target=new Date(t.startDate+"T00:00:00"), now=new Date();
  const diff=Math.ceil((target-now)/86400000);
  $("dday").textContent=diff>0?`D-${diff}`:diff===0?"D-Day":"여행 완료";
  $("transportInfo").innerHTML=(t.transport||[]).map(x=>`<div style="margin:6px 0">${x}</div>`).join("") || '<div class="small">교통 정보 없음</div>';
  const h=t.hotel||{};
  $("hotelInfo").innerHTML=h.name?`<b>${h.name}</b><div style="margin-top:6px">체크인 ${h.checkIn}</div><div>체크아웃 ${h.checkOut}</div><div>${(h.pool||[]).join(" · ")}</div>`:'<div class="small">호텔 정보 없음</div>';
  renderTripList();
  renderNext();
}

function renderTripList(){
  const wrap=$("tripList"); wrap.innerHTML="";
  state.trips.forEach(t=>{
    const b=document.createElement("button");
    b.className="tripTile"+(t.id===state.activeTripId?" active":"");
    b.innerHTML=`<b>${t.name}</b><div class="small" style="margin-top:4px">${fmtDate(t.startDate)}~${fmtDate(t.endDate)}</div>`;
    b.onclick=()=>{state.activeTripId=t.id;saveState();currentDate=null;renderAll();};
    wrap.appendChild(b);
  });
}

function addTrip(){
  const name=$("newTripName").value.trim(), start=$("newTripStart").value, end=$("newTripEnd").value;
  if(!name||!start||!end)return alert("여행 이름과 날짜를 입력해주세요.");
  const id="trip-"+Date.now();
  const dates={}; dates[start]=[];
  state.trips.push({id,name,startDate:start,endDate:end,hotel:{},transport:[],schedule:dates,places:[]});
  state.activeTripId=id; saveState();
  $("newTripName").value=""; $("newTripStart").value=""; $("newTripEnd").value="";
  $("tripAdd").classList.remove("show"); currentDate=null; renderAll();
}

function renderTabs(){
  const t=activeTrip(), dates=Object.keys(t.schedule||{}).sort();
  if(!currentDate || !dates.includes(currentDate)) currentDate=dates[0] || t.startDate;
  const tabs=$("dayTabs"); tabs.innerHTML="";
  const sel=$("addDate"); sel.innerHTML="";
  dates.forEach(d=>{
    const b=document.createElement("button");
    b.textContent=d.slice(5).replace("-","/");
    b.classList.toggle("active",d===currentDate);
    b.onclick=()=>{currentDate=d;renderTabs();renderSchedule();};
    tabs.appendChild(b);
    const o=document.createElement("option");o.value=d;o.textContent=d.slice(5).replace("-","/");sel.appendChild(o);
  });
}

function renderSchedule(){
  const t=activeTrip(), items=(t.schedule&&t.schedule[currentDate])||[], wrap=$("scheduleList");
  wrap.innerHTML="";
  if(!items.length){wrap.innerHTML='<div class="empty">일정이 없습니다.</div>';return;}
  items.forEach((it,i)=>{
    const key=`done:${t.id}:${currentDate}:${i}`;
    const noteKey=`note:${t.id}:${currentDate}:${i}`;
    const done=localStorage.getItem(key)==="1", note=localStorage.getItem(noteKey)||"";
    const el=document.createElement("div");el.className="scheduleItem";
    el.innerHTML=`
      <div class="time">${it.time}</div>
      <div>
        <div class="eventTitle">${it.title}</div>
        <div class="eventDetail">${it.detail||""}</div>
        <input class="noteInput" placeholder="이 일정 메모" value="${note.replaceAll('"','&quot;')}">
        <div class="actions"><button class="danger" onclick="deleteSchedule(${i})">삭제</button></div>
      </div>
      <input class="check" type="checkbox" ${done?"checked":""}>
    `;
    const noteInput=el.querySelector(".noteInput");
    noteInput.oninput=()=>localStorage.setItem(noteKey,noteInput.value);
    const check=el.querySelector(".check");
    check.onchange=()=>localStorage.setItem(key,check.checked?"1":"0");
    wrap.appendChild(el);
  });
}

function addSchedule(){
  const t=activeTrip(), d=$("addDate").value, time=$("addTime").value.trim(), title=$("addTitle").value.trim(), detail=$("addDetail").value.trim();
  if(!time||!title)return alert("시간과 일정 이름을 입력해주세요.");
  if(!t.schedule[d])t.schedule[d]=[];
  t.schedule[d].push({time,title,detail}); saveState();
  $("addTime").value=$("addTitle").value=$("addDetail").value="";
  $("scheduleAdd").classList.remove("show"); currentDate=d; renderTabs(); renderSchedule(); renderNext();
}
function deleteSchedule(i){if(confirm("이 일정을 삭제할까요?")){activeTrip().schedule[currentDate].splice(i,1);saveState();renderSchedule();renderNext();}}

function renderPlaces(){
  const t=activeTrip(), wrap=$("placeList");wrap.innerHTML="";
  (t.places||[]).forEach((p,i)=>{
    const q=encodeURIComponent(p.query||p.name+" "+(p.address||""));
    const noteKey=`placeNote:${t.id}:${i}`;
    const note=localStorage.getItem(noteKey)||"";
    const el=document.createElement("div");el.className="placeCard";
    el.innerHTML=`<h3>📍 ${p.name}</h3><div>${p.address||""}</div><div class="small" style="margin-top:5px">이동: ${p.mode||"미정"}</div>
      <input class="noteInput" placeholder="이 장소 메모" value="${note.replaceAll('"','&quot;')}">
      <div class="actions"><a class="btn" target="_blank" href="https://map.naver.com/p/search/${q}">지도 열기</a><button class="danger" onclick="deletePlace(${i})">삭제</button></div>`;
    el.querySelector(".noteInput").oninput=e=>localStorage.setItem(noteKey,e.target.value);
    wrap.appendChild(el);
  });
  if(!(t.places||[]).length)wrap.innerHTML='<div class="card empty">장소가 없습니다.</div>';
}
function addPlace(){
  const t=activeTrip(), name=$("placeName").value.trim(),address=$("placeAddress").value.trim(),mode=$("placeMode").value.trim();
  if(!name)return alert("장소명을 입력해주세요.");
  if(!t.places)t.places=[];
  t.places.push({name,address,mode,query:name+" "+address});saveState();renderPlaces();
  $("placeName").value=$("placeAddress").value=$("placeMode").value="";$("placeAdd").classList.remove("show");
}
function deletePlace(i){if(confirm("이 장소를 삭제할까요?")){activeTrip().places.splice(i,1);saveState();renderPlaces();}}

function renderPacking(){
  const wrap=$("packingList");wrap.innerHTML="";
  packing.forEach((p,i)=>{
    const row=document.createElement("div");row.className="packRow";
    row.innerHTML=`<input type="checkbox" ${p.done?"checked":""}><span>${p.name}</span><button class="danger">삭제</button>`;
    row.querySelector("input").onchange=e=>{packing[i].done=e.target.checked;savePacking();};
    row.querySelector("button").onclick=()=>{packing.splice(i,1);savePacking();renderPacking();};
    wrap.appendChild(row);
  });
}
function addPacking(){
  const n=$("packingName").value.trim();if(!n)return;
  packing.push({name:n,done:false});savePacking();renderPacking();$("packingName").value="";$("packingAdd").classList.remove("show");
}

function renderNext(){
  const t=activeTrip(), now=new Date();let found=null;
  Object.entries(t.schedule||{}).sort().forEach(([date,items])=>items.forEach(it=>{
    const m=it.time.match(/^(\d{2}):(\d{2})/);if(!m)return;
    const dt=new Date(`${date}T${m[1]}:${m[2]}:00`);
    if(dt>=now && (!found||dt<found.dt))found={dt,it,date};
  }));
  $("nextSchedule").innerHTML=found?`<b>${found.date.slice(5).replace("-","/")} ${found.it.time} · ${found.it.title}</b><div class="eventDetail">${found.it.detail||""}</div>`:"예정된 일정이 없습니다.";
}

$("globalMemo").value=localStorage.getItem("malikTripV2Memo")||"";
$("globalMemo").oninput=()=>localStorage.setItem("malikTripV2Memo",$("globalMemo").value);

function renderAll(){
  renderHome(); renderTabs(); renderSchedule(); renderPlaces(); renderPacking();
}
renderAll();
if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js");
</script>

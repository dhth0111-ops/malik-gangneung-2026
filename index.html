<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Malik Trip</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{--navy:#0d3666;--red:#ed3038;--blue:#1f6fe5;--yellow:#eda500;--green:#179c56;--ink:#172c3f;--muted:#708092;--line:#dfe7ef;--bg:#f4f8fb;--card:#fff;--shadow:0 8px 24px rgba(15,51,84,.10)}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;color:var(--ink)}button,input,textarea,select{font:inherit}button{cursor:pointer}
header{background:#fff;padding:18px 18px 12px;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line)}.brand{text-align:center}.brand h1{margin:0;color:var(--navy);font-size:34px;font-style:italic}.brand p{margin:2px 0 0;font-size:18px;color:var(--navy)}
.wrap{max-width:780px;margin:auto;padding:0 14px 92px}.status{display:flex;gap:12px;align-items:center;background:white;border:1px solid var(--line);border-radius:18px;padding:13px 16px;margin:12px 0;box-shadow:var(--shadow)}.dot{width:12px;height:12px;border-radius:50%;background:var(--green)}.status strong{color:var(--green)}
.people{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0}.person{border:2px solid var(--line);background:#fff;border-radius:20px;padding:12px 8px;text-align:center;box-shadow:var(--shadow)}.person img{width:82px;height:82px;object-fit:cover;border-radius:50%}.person b{display:block;font-size:19px;margin-top:5px}.person small{font-weight:800}.person.red{border-color:#f6c4c6}.person.red b,.person.red small{color:var(--red)}.person.blue{border-color:#c9dafc}.person.blue b,.person.blue small{color:var(--blue)}.person.yellow{border-color:#ffe19a}.person.yellow b,.person.yellow small{color:#d88f00}.person.active{box-shadow:0 0 0 4px rgba(13,54,102,.16)}
.hero{height:210px;background:url('./hero-sea.png') center/cover;border-radius:0 0 26px 26px;margin:0 -14px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(8,53,95,.60),rgba(8,53,95,.02))}.heroText{position:absolute;z-index:1;left:26px;bottom:28px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3)}.heroText h2{margin:0;font-size:28px}.heroText p{margin:6px 0 0;font-weight:700}
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.quick button{background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px 6px;box-shadow:var(--shadow);color:var(--ink);font-weight:900}.quick span{display:block;font-size:28px;margin-bottom:7px}
.section{display:none}.section.active{display:block}.card,.place{background:#fff;border:1px solid var(--line);border-radius:20px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}.card h3,.place h3{margin:0 0 12px;font-size:20px}.homeGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dayTabs{display:flex;gap:8px;margin-bottom:10px;overflow:auto}.dayTabs button{border:0;border-radius:999px;padding:10px 14px;background:#eef2f6;font-weight:900;white-space:nowrap}.dayTabs button.active{background:var(--red);color:#fff}
.item{display:grid;grid-template-columns:88px minmax(0,1fr) 30px;gap:10px;padding:13px 0;border-bottom:1px solid #eef2f6;align-items:start}.time{font-weight:900;color:var(--red);line-height:1.3;overflow-wrap:anywhere}.title{font-weight:900;line-height:1.35}.detail,.meta{font-size:12px;color:var(--muted);line-height:1.45;margin-top:4px}.memo{width:100%;min-height:150px;border:1px solid var(--line);border-radius:13px;padding:11px;margin-top:8px;resize:vertical;background:#fbfdff}.check{width:23px;height:23px}
.activityRow{padding:10px 0;border-bottom:1px solid #eef2f6}.expenseSummary{display:grid;grid-template-columns:1.2fr repeat(4,1fr);gap:6px;text-align:center}.sumBox{padding:12px 5px;border-right:1px solid var(--line)}.sumBox:last-child{border-right:0}.total{font-size:25px;font-weight:900;color:var(--red)}
.btn{border:0;border-radius:13px;background:var(--navy);color:#fff;font-weight:900;padding:10px 13px}.btn.secondary{background:#eaf2fb;color:var(--navy)}.btn.danger{background:#ffebec;color:#aa2227}.field{width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;margin:5px 0;background:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.addPanel{display:none;background:#f5f9fc;padding:12px;border-radius:15px;margin-top:10px}.addPanel.show{display:block}
.pack{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #eef2f6}.pack span{flex:1}.pack input{width:22px;height:22px}
.bottom{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(6,1fr);z-index:30}.bottom button{border:0;background:#fff;padding:8px 2px 10px;color:#586777;font-size:11px;font-weight:800}.bottom button.active{color:var(--red)}.bottom span{display:block;font-size:20px;margin-bottom:2px}
.picker{position:fixed;inset:0;background:rgba(7,30,49,.58);display:none;place-items:center;padding:20px;z-index:100}.picker.show{display:grid}.pickerCard{background:#fff;border-radius:26px;padding:22px;width:min(430px,100%);box-shadow:0 20px 70px rgba(0,0,0,.25)}.pickBtn{width:100%;display:grid;grid-template-columns:58px 1fr auto;align-items:center;gap:12px;background:#fff;border:2px solid var(--line);border-radius:18px;padding:12px;margin:10px 0;color:var(--ink);text-align:left}.pickBtn img{width:54px;height:54px;object-fit:cover;border-radius:50%}.pickBtn b{font-size:18px}
@media(max-width:650px){.homeGrid{grid-template-columns:1fr}.expenseSummary{grid-template-columns:1fr 1fr}.sumBox{border:0;border-bottom:1px solid var(--line)}}@media(max-width:390px){.brand h1{font-size:29px}.person img{width:67px;height:67px}.person b{font-size:16px}.item{grid-template-columns:78px minmax(0,1fr) 28px}}
</style>
</head>
<body>
<header><div class="brand"><h1>Malik Trip 🌊</h1><p>강릉 여행 2026</p></div></header>
<div class="wrap">
<div class="status"><span class="dot"></span><strong id="sync">연결 중</strong><span>|</span><span>마지막 업데이트 <b id="lastUpdate">-</b></span></div>
<div class="people">
<button class="person red" onclick="chooseUser('사과머리')"><img src="./avatar-apple.png"><b>사과머리</b><small>빨강</small></button>
<button class="person blue" onclick="chooseUser('꼬꼬마')"><img src="./avatar-kokko.png"><b>꼬꼬마</b><small>파랑</small></button>
<button class="person yellow" onclick="chooseUser('아기천사')"><img src="./avatar-angel.png"><b>아기천사</b><small>노랑</small></button>
</div>
<div class="hero"><div class="heroText"><h2>강릉에서의 소중한 시간</h2><p>함께 쓰고, 함께 기억해요</p></div></div>
<div class="quick">
<button onclick="go('schedule')"><span>📅</span>일정</button><button onclick="go('places')"><span>📍</span>장소</button><button onclick="go('memo')"><span>📝</span>메모</button><button onclick="go('packing')"><span>✅</span>준비물</button><button onclick="go('expenses')"><span>💳</span>여행경비</button><button onclick="go('more')"><span>•••</span>더보기</button>
</div>
<section id="home" class="section active"><div class="homeGrid"><div class="card"><h3>오늘의 일정</h3><div id="homeTabs" class="dayTabs"></div><div id="homeSchedule"></div></div><div class="card"><h3>최근 활동</h3><div id="activity"></div></div></div><div class="card"><h3>여행경비 요약</h3><div id="expenseSummary" class="expenseSummary"></div></div></section>
<section id="schedule" class="section"><div class="card"><h3>일정</h3><div id="dayTabs" class="dayTabs"></div><div id="scheduleList"></div><button class="btn" onclick="toggle('scheduleAdd')">일정 추가</button><div id="scheduleAdd" class="addPanel"><select id="addDate" class="field"></select><input id="addTime" class="field" placeholder="시간"><input id="addTitle" class="field" placeholder="일정 이름"><input id="addDetail" class="field" placeholder="상세"><button class="btn" onclick="addSchedule()">저장</button></div></div></section>
<section id="places" class="section"><div id="placeList"></div><div class="card"><button class="btn" onclick="toggle('placeAdd')">장소 추가</button><div id="placeAdd" class="addPanel"><input id="placeName" class="field" placeholder="장소명"><input id="placeAddress" class="field" placeholder="주소"><input id="placeMode" class="field" placeholder="도보/택시"><button class="btn" onclick="addPlace()">저장</button></div></div></section>
<section id="memo" class="section"><div class="card"><h3>여행 메모</h3><textarea id="travelMemo" class="memo" style="min-height:320px" placeholder="세 명이 함께 보는 메모"></textarea><div id="memoMeta" class="meta"></div></div></section>
<section id="packing" class="section"><div class="card"><h3>준비물</h3><div id="packingList"></div><button class="btn" onclick="toggle('packingAdd')">준비물 추가</button><div id="packingAdd" class="addPanel"><input id="packingName" class="field" placeholder="준비물"><select id="packingCat" class="field"><option>의류</option><option>세면도구</option><option>전자기기</option><option>교통</option><option>수영</option><option>기타</option></select><button class="btn" onclick="addPacking()">추가</button></div></div></section>
<section id="expenses" class="section"><div class="card"><h3>여행경비</h3><div id="expenseTotal" class="total">0원</div></div><div id="expenseList"></div><div class="card"><button class="btn" onclick="toggle('expenseAdd')">지출 추가</button><div id="expenseAdd" class="addPanel"><input id="expDate" class="field" type="date"><select id="expCat" class="field"><option>식비</option><option>교통비</option><option>쇼핑/간식</option><option>숙박비</option><option>기타</option></select><input id="expTitle" class="field" placeholder="항목"><input id="expAmount" class="field" type="number" placeholder="금액"><textarea id="expMemo" class="memo" placeholder="메모"></textarea><button class="btn" onclick="addExpense()">저장</button></div></div></section>
<section id="more" class="section"><div class="card"><h3>공지사항</h3><textarea id="notice" class="memo" placeholder="세 명이 함께 보는 공지"></textarea><div id="noticeMeta" class="meta"></div></div><div class="card"><h3>내 프로필</h3><p id="profileText"></p><button class="btn secondary" onclick="openPicker()">프로필 변경</button></div><div class="card"><h3>데이터 관리</h3><p class="detail">일정이나 준비물이 비어 있을 때 기본 강릉 데이터를 복원합니다.</p><button class="btn danger" onclick="restoreSeed()">강릉 기본 데이터 복원</button></div></section>
</div>
<nav class="bottom"><button class="active" data-tab="home"><span>🏠</span>홈</button><button data-tab="schedule"><span>📅</span>일정</button><button data-tab="places"><span>📍</span>장소</button><button data-tab="memo"><span>📝</span>메모</button><button data-tab="expenses"><span>💳</span>여행경비</button><button data-tab="more"><span>•••</span>더보기</button></nav>
<div id="picker" class="picker"><div class="pickerCard"><h2>사용자를 선택하세요</h2><p>이 휴대폰에서 사용할 프로필입니다.</p><button class="pickBtn" onclick="chooseUser('사과머리')"><img src="./avatar-apple.png"><b>사과머리</b><span style="color:var(--red)">빨강</span></button><button class="pickBtn" onclick="chooseUser('꼬꼬마')"><img src="./avatar-kokko.png"><b>꼬꼬마</b><span style="color:var(--blue)">파랑</span></button><button class="pickBtn" onclick="chooseUser('아기천사')"><img src="./avatar-angel.png"><b>아기천사</b><span style="color:#d88f00">노랑</span></button></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>
<script>
const seed={"trip": {"name": "말릭존슨강릉2026", "subtitle": "강릉 여행 2026", "updatedAt": "", "notice": "", "noticeBy": "", "noticeAt": "", "memo": "", "memoBy": "", "memoAt": "", "activity": [], "schedule": {"2026-07-17": [{"time": "04:30", "title": "집 출발", "detail": "구리시 체육관로 45 → 상봉역 · 택시", "done": false, "memo": "", "by": "", "at": ""}, {"time": "05:33", "title": "상봉역 출발", "detail": "KTX", "done": false, "memo": "", "by": "", "at": ""}, {"time": "07:03", "title": "강릉역 도착", "detail": "동화가든까지 택시 이동", "done": false, "memo": "", "by": "", "at": ""}, {"time": "07:20~08:20", "title": "동화가든 아점", "detail": "짬뽕순두부 · 강릉시 초당순두부길 77", "done": false, "memo": "", "by": "", "at": ""}, {"time": "08:20~13:30", "title": "초당동·경포 자유시간", "detail": "산책 및 휴식", "done": false, "memo": "", "by": "", "at": ""}, {"time": "14:00", "title": "세인트존스 얼리 체크인", "detail": "객실 입실", "done": false, "memo": "", "by": "", "at": ""}, {"time": "15:00~16:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔", "done": false, "memo": "", "by": "", "at": ""}, {"time": "17:00~18:00", "title": "엄지네포장마차 저녁", "detail": "꼬막비빔밥", "done": false, "memo": "", "by": "", "at": ""}, {"time": "18:00 이후", "title": "호텔 휴식", "detail": "자유시간", "done": false, "memo": "", "by": "", "at": ""}], "2026-07-18": [{"time": "08:00~09:30", "title": "인피니티풀 수영", "detail": "세인트존스 호텔", "done": false, "memo": "", "by": "", "at": ""}, {"time": "10:30~11:30", "title": "팔도전복해물뚝배기 아점", "detail": "강릉시 해안로 1079 · 도보", "done": false, "memo": "", "by": "", "at": ""}, {"time": "11:30~16:30", "title": "경포대·경포해변 산책", "detail": "자유시간", "done": false, "memo": "", "by": "", "at": ""}, {"time": "17:00~18:00", "title": "고성생선찜 저녁", "detail": "강릉시 성덕포남로 56", "done": false, "memo": "", "by": "", "at": ""}], "2026-07-19": [{"time": "06:30~07:30", "title": "쓰리밀즈 조식", "detail": "세인트존스 호텔", "done": false, "memo": "", "by": "", "at": ""}, {"time": "11:00", "title": "세인트존스 체크아웃", "detail": "", "done": false, "memo": "", "by": "", "at": ""}, {"time": "11:30~12:30", "title": "교동반점 점심", "detail": "택시 이동", "done": false, "memo": "", "by": "", "at": ""}, {"time": "12:40~15:30", "title": "강릉중앙시장 구경", "detail": "강릉시 금성로 21", "done": false, "memo": "", "by": "", "at": ""}, {"time": "16:45", "title": "강릉역 출발", "detail": "KTX", "done": false, "memo": "", "by": "", "at": ""}, {"time": "18:16", "title": "상봉역 도착", "detail": "여행 종료", "done": false, "memo": "", "by": "", "at": ""}]}, "places": [{"name": "동화가든", "address": "강원 강릉시 초당순두부길 77", "mode": "택시", "memo": "", "by": "", "at": ""}, {"name": "세인트존스 호텔", "address": "강원 강릉시 창해로 307", "mode": "택시", "memo": "", "by": "", "at": ""}, {"name": "엄지네포장마차", "address": "강원 강릉시 경강로2255번길 21", "mode": "택시", "memo": "", "by": "", "at": ""}, {"name": "팔도전복해물뚝배기", "address": "강원 강릉시 해안로 1079", "mode": "도보", "memo": "", "by": "", "at": ""}, {"name": "고성생선찜", "address": "강원 강릉시 성덕포남로 56", "mode": "택시", "memo": "", "by": "", "at": ""}, {"name": "강릉중앙시장", "address": "강원 강릉시 금성로 21", "mode": "도보", "memo": "", "by": "", "at": ""}], "packing": [{"name": "신분증", "category": "기타", "done": false, "by": "", "at": ""}, {"name": "KTX 승차권", "category": "교통", "done": false, "by": "", "at": ""}, {"name": "수영복", "category": "수영", "done": false, "by": "", "at": ""}, {"name": "슬리퍼", "category": "수영", "done": false, "by": "", "at": ""}, {"name": "충전기", "category": "전자기기", "done": false, "by": "", "at": ""}, {"name": "보조배터리", "category": "전자기기", "done": false, "by": "", "at": ""}, {"name": "선크림", "category": "기타", "done": false, "by": "", "at": ""}], "expenses": []}};
let state=JSON.parse(JSON.stringify(seed)),db=null,ref=null,currentDate="2026-07-17",saveTimer=null,editing=false;
const $=id=>document.getElementById(id),me=()=>localStorage.getItem("malikTripUser")||"",nowText=()=>new Date().toLocaleString("ko-KR"),shortTime=()=>new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
const profile={사과머리:{color:"#ed3038"},꼬꼬마:{color:"#1f6fe5"},아기천사:{color:"#eda500"}};
function cloneSeed(){return JSON.parse(JSON.stringify(seed))}
function userHtml(name){const p=profile[name]||{color:"#708092"};return `<span style="color:${p.color};font-weight:900">${name||"사용자"}</span>`}
function openPicker(){$("picker").classList.add("show")}
function chooseUser(name){localStorage.setItem("malikTripUser",name);$("picker").classList.remove("show");renderPeople();renderMore();if(ref){log(`${name} 프로필 선택`);queueSave()}}
function renderPeople(){document.querySelectorAll(".person").forEach(x=>x.classList.remove("active"));const names=["사과머리","꼬꼬마","아기천사"];const i=names.indexOf(me());if(i>=0)document.querySelectorAll(".person")[i].classList.add("active")}
function go(id){document.querySelectorAll(".section").forEach(x=>x.classList.remove("active"));$(id).classList.add("active");document.querySelectorAll(".bottom button").forEach(x=>x.classList.toggle("active",x.dataset.tab===id))}
document.querySelectorAll(".bottom button").forEach(b=>b.onclick=()=>go(b.dataset.tab));
document.addEventListener("focusin",e=>{
  if(e.target.matches("textarea,input,select")){
    editing=true;
    $("sync").textContent="입력 중 · 자동 저장";
  }
});
document.addEventListener("focusout",e=>{
  if(e.target.matches("textarea,input,select")){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(async()=>{
      await save();
      editing=false;
      $("sync").textContent="실시간 연결됨";
    },250);
  }
});
function toggle(id){$(id).classList.toggle("show")}
function timeToMinutes(value){
  const s=String(value||"").trim();
  const m=s.match(/(\d{1,2})\s*:\s*(\d{2})/);
  if(m) return Number(m[1])*60+Number(m[2]);
  const h=s.match(/(\d{1,2})\s*시/);
  if(h) return Number(h[1])*60;
  if(s.includes("이후")) return 1439;
  return 1440;
}
function sortSchedule(date){
  if(!state.trip.schedule[date]) return;
  state.trip.schedule[date].sort((a,b)=>timeToMinutes(a.time)-timeToMinutes(b.time));
}

function touch(obj){obj.by=me();obj.at=nowText();state.trip.updatedAt=nowText()}
function log(text){state.trip.activity=state.trip.activity||[];state.trip.activity.unshift({text,by:me()||"꼬꼬마",at:nowText()});state.trip.activity=state.trip.activity.slice(0,40);state.trip.updatedAt=nowText()}
function queueSave(){clearTimeout(saveTimer);saveTimer=setTimeout(save,1200)}
async function save(){if(!ref){localStorage.setItem("malikTripOffline",JSON.stringify(state));$("sync").textContent="이 기기에 저장됨";return}try{await ref.set(state,{merge:false})}catch(e){$("sync").textContent="저장 오류";console.error(e)}}
function isBroken(data){return !data||!data.trip||!data.trip.schedule||Object.keys(data.trip.schedule).length===0||!Array.isArray(data.trip.places)||data.trip.places.length===0||!Array.isArray(data.trip.packing)||data.trip.packing.length===0}
async function init(){
 if(!me())openPicker();
 try{
  firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
  db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  ref=db.collection("sharedTrips").doc("gangneung-2026");
  ref.onSnapshot(async snap=>{
   if(!snap.exists||isBroken(snap.data())){
    state=cloneSeed();log("강릉 기본 데이터 자동 복원");await ref.set(state,{merge:false});return;
   }
   if(editing){
    $("sync").textContent="입력 중 · 자동 저장";
    return;
   }
   state=snap.data();$("sync").textContent="실시간 연결됨";renderAll();
  },err=>{$("sync").textContent="연결 실패";console.error(err)});
 }catch(e){const local=localStorage.getItem("malikTripOffline");if(local)state=JSON.parse(local);$("sync").textContent="이 기기에만 저장";renderAll()}
}
function renderAll(){Object.keys(state.trip.schedule||{}).forEach(sortSchedule);if(!state.trip.schedule[currentDate])currentDate=Object.keys(state.trip.schedule).sort()[0];renderPeople();renderHome();renderTabs();renderSchedule();renderPlaces();renderMemo();renderPacking();renderExpenses();renderMore();$("lastUpdate").textContent=state.trip.updatedAt?shortTime():"-"}
function renderHome(){renderMiniTabs();const items=state.trip.schedule[currentDate]||[];$("homeSchedule").innerHTML=items.slice(0,4).map(x=>`<div class="item"><div class="time">${x.time}</div><div><div class="title">${x.title}</div><div class="detail">${x.detail||""}</div></div><input class="check" type="checkbox" ${x.done?"checked":""} disabled></div>`).join("");$("activity").innerHTML=(state.trip.activity||[]).slice(0,6).map(a=>`<div class="activityRow">${userHtml(a.by)} ${a.text}<div class="meta">${a.at}</div></div>`).join("")||'<div class="meta">아직 활동이 없습니다.</div>';renderExpenseSummary()}
function renderMiniTabs(){const dates=Object.keys(state.trip.schedule).sort();$("homeTabs").innerHTML=dates.map(d=>`<button class="${d===currentDate?"active":""}" onclick="currentDate='${d}';renderHome();renderTabs();renderSchedule()">${d.slice(5).replace("-","/")}</button>`).join("")}
function renderTabs(){const dates=Object.keys(state.trip.schedule).sort();$("dayTabs").innerHTML=dates.map(d=>`<button class="${d===currentDate?"active":""}" onclick="currentDate='${d}';renderTabs();renderSchedule();renderHome()">${d.slice(5).replace("-","/")}</button>`).join("");$("addDate").innerHTML=dates.map(d=>`<option>${d}</option>`).join("")}
function renderSchedule(){$("scheduleList").innerHTML="";(state.trip.schedule[currentDate]||[]).forEach((x,i)=>{const el=document.createElement("div");el.className="item";el.innerHTML=`<div class="time">${x.time}</div><div><div class="title">${x.title}</div><div class="detail">${x.detail||""}</div><textarea class="memo" placeholder="이 일정 메모">${x.memo||""}</textarea><div class="meta">${x.by?x.by+" · "+x.at:""}</div><div class="actions"><button class="btn secondary editScheduleBtn">수정</button><button class="btn danger">삭제</button></div></div><input class="check" type="checkbox" ${x.done?"checked":""}>`;el.querySelector("textarea").oninput=e=>{x.memo=e.target.value;touch(x);queueSave()};el.querySelector(".check").onchange=e=>{x.done=e.target.checked;touch(x);log(`${x.title} 완료 상태 변경`);queueSave()};el.querySelector(".editScheduleBtn").onclick=()=>{
  const newTime = prompt("시간", x.time);
  if(newTime === null) return;
  const newTitle = prompt("일정 이름", x.title);
  if(newTitle === null) return;
  const newDetail = prompt("상세 내용", x.detail || "");
  if(newDetail === null) return;
  x.time = newTime.trim() || x.time;
  x.title = newTitle.trim() || x.title;
  x.detail = newDetail.trim();
  touch(x);
  sortSchedule(currentDate);
  log(`${x.title} 일정 수정`);
  queueSave();
  renderSchedule();
  renderHome();
};
el.querySelector(".danger").onclick=()=>{if(confirm("삭제할까요?")){state.trip.schedule[currentDate].splice(i,1);log(`${x.title} 일정 삭제`);queueSave()}};$("scheduleList").appendChild(el)})}
function addSchedule(){const d=$("addDate").value,t=$("addTime").value.trim(),n=$("addTitle").value.trim(),de=$("addDetail").value.trim();if(!t||!n)return alert("시간과 이름을 입력하세요.");state.trip.schedule[d].push({time:t,title:n,detail:de,done:false,memo:"",by:me(),at:nowText()});sortSchedule(d);log(`${n} 일정 추가`);queueSave();renderSchedule();renderHome();$("scheduleAdd").classList.remove("show")}
function renderPlaces(){$("placeList").innerHTML="";state.trip.places.forEach((p,i)=>{const q=encodeURIComponent(p.name+" "+p.address),el=document.createElement("div");el.className="place";el.innerHTML=`<h3>${p.name}</h3><div>${p.address}</div><div class="detail">이동: ${p.mode}</div><textarea class="memo" placeholder="장소 메모">${p.memo||""}</textarea><div class="meta">${p.by?p.by+" · "+p.at:""}</div><div class="actions"><a class="btn" target="_blank" href="https://map.naver.com/p/search/${q}">지도 열기</a><button class="btn danger">삭제</button></div>`;el.querySelector("textarea").oninput=e=>{p.memo=e.target.value;touch(p);queueSave()};el.querySelector(".danger").onclick=()=>{if(confirm("삭제할까요?")){state.trip.places.splice(i,1);log(`${p.name} 장소 삭제`);queueSave()}};$("placeList").appendChild(el)})}
function addPlace(){const n=$("placeName").value.trim(),a=$("placeAddress").value.trim(),m=$("placeMode").value.trim();if(!n)return;state.trip.places.push({name:n,address:a,mode:m,memo:"",by:me(),at:nowText()});log(`${n} 장소 추가`);queueSave();$("placeAdd").classList.remove("show")}
function renderMemo(){$("travelMemo").value=state.trip.memo||"";$("memoMeta").innerHTML=state.trip.memoBy?`${userHtml(state.trip.memoBy)} · ${state.trip.memoAt}`:""}
$("travelMemo").oninput=e=>{state.trip.memo=e.target.value;state.trip.memoBy=me();state.trip.memoAt=nowText();state.trip.updatedAt=nowText();queueSave()}
function renderPacking(){$("packingList").innerHTML="";state.trip.packing.forEach((p,i)=>{const el=document.createElement("div");el.className="pack";el.innerHTML=`<input type="checkbox" ${p.done?"checked":""}><span><b>${p.name}</b><div class="meta">${p.category}${p.by?" · "+p.by+" · "+p.at:""}</div></span><button class="btn danger">삭제</button>`;el.querySelector("input").onchange=e=>{p.done=e.target.checked;touch(p);log(`${p.name} 준비물 체크 변경`);queueSave()};el.querySelector("button").onclick=()=>{state.trip.packing.splice(i,1);log(`${p.name} 준비물 삭제`);queueSave()};$("packingList").appendChild(el)})}
function addPacking(){const n=$("packingName").value.trim();if(!n)return;state.trip.packing.push({name:n,category:$("packingCat").value,done:false,by:me(),at:nowText()});log(`${n} 준비물 추가`);queueSave();$("packingAdd").classList.remove("show")}
function renderExpenseSummary(){const cats={"식비":0,"교통비":0,"쇼핑/간식":0,"숙박비":0};let total=0;(state.trip.expenses||[]).forEach(x=>{total+=Number(x.amount)||0;if(cats[x.category]!=null)cats[x.category]+=Number(x.amount)||0});$("expenseSummary").innerHTML=`<div class="sumBox"><div>총 지출</div><div class="total">${total.toLocaleString()}원</div></div>`+Object.entries(cats).map(([k,v])=>`<div class="sumBox"><b>${k}</b><div>${v.toLocaleString()}원</div></div>`).join("")}
function renderExpenses(){let total=0;$("expenseList").innerHTML="";(state.trip.expenses||[]).forEach((x,i)=>{total+=Number(x.amount)||0;const el=document.createElement("div");el.className="place";el.innerHTML=`<h3>${x.category} · ${x.title}</h3><div class="total" style="font-size:22px">${Number(x.amount).toLocaleString()}원</div><div class="detail">${x.date} · ${x.memo||""}</div><div class="meta">${x.by} · ${x.at}</div><div class="actions"><button class="btn secondary">수정</button><button class="btn danger">삭제</button></div>`;el.querySelector(".secondary").onclick=()=>{const t=prompt("항목",x.title);if(t===null)return;const a=prompt("금액",x.amount);if(a===null)return;x.title=t;x.amount=Number(a);touch(x);log(`${x.title} 경비 수정`);queueSave()};el.querySelector(".danger").onclick=()=>{if(confirm("삭제할까요?")){state.trip.expenses.splice(i,1);log(`${x.title} 경비 삭제`);queueSave()}};$("expenseList").appendChild(el)});$("expenseTotal").textContent=total.toLocaleString()+"원";renderExpenseSummary()}
function addExpense(){const x={date:$("expDate").value||new Date().toISOString().slice(0,10),category:$("expCat").value,title:$("expTitle").value.trim(),amount:Number($("expAmount").value),memo:$("expMemo").value.trim(),by:me(),at:nowText()};if(!x.title||!x.amount)return alert("항목과 금액을 입력하세요.");state.trip.expenses.push(x);log(`${x.title} 경비 추가`);queueSave();$("expenseAdd").classList.remove("show")}
function renderMore(){$("profileText").textContent=me()?`현재 프로필: ${me()}`:"프로필을 선택해주세요";$("notice").value=state.trip.notice||"";$("noticeMeta").textContent=state.trip.noticeBy?state.trip.noticeBy+" · "+state.trip.noticeAt:""}
$("notice").oninput=e=>{state.trip.notice=e.target.value;state.trip.noticeBy=me();state.trip.noticeAt=nowText();state.trip.updatedAt=nowText();queueSave()}
async function restoreSeed(){if(!confirm("강릉 기본 데이터로 복원할까요? 현재 공유 데이터가 기본값으로 바뀝니다."))return;state=cloneSeed();log("강릉 기본 데이터 수동 복원");await save();renderAll()}
init();if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js");
</script>
</body></html>

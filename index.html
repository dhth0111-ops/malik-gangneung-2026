function normalizeDb(){
  const base=clone(INITIAL);
  if(!db || typeof db!=='object') db=base;
  db.seasons=Array.isArray(db.seasons)?db.seasons:base.seasons;
  db.areas=Array.isArray(db.areas)?db.areas:base.areas;
  db.places=Array.isArray(db.places)?db.places:base.places;
  db.foodAreas=Array.isArray(db.foodAreas)?db.foodAreas:clone(base.foodAreas||[]);
  for(const s of db.seasons){s.placeIds=Array.isArray(s.placeIds)?s.placeIds:[]}
  for(const p of db.places){
    p.checklist=Array.isArray(p.checklist)?p.checklist:[];
    p.photoSpots=Array.isArray(p.photoSpots)?p.photoSpots:[];
    p.restaurants=Array.isArray(p.restaurants)?p.restaurants:[];
    p.visits=Array.isArray(p.visits)?p.visits:[];
    p.notes=(p.notes&&typeof p.notes==='object')?p.notes:{'사과머리':'','꼬꼬마':'','아기천사':''};
  }
  // 새 기본 장소/생활권/시즌은 추가하되 기존 기록은 절대 덮어쓰지 않는다.
  for(const a of base.areas) if(!db.areas.some(x=>x.id===a.id)) db.areas.push(a);
  for(const s of base.seasons) if(!db.seasons.some(x=>x.id===s.id)) db.seasons.push(s);
  for(const p of base.places) if(!db.places.some(x=>x.id===p.id)) db.places.push(p);
}

function clone(x){return JSON.parse(JSON.stringify(x))}function load(){try{return JSON.parse(localStorage.getItem(KEY))||clone(INITIAL)}catch(e){return clone(INITIAL)}}function mergeFoodMaster(){db.areas=Array.isArray(db.areas)?db.areas:[];for(const a of INITIAL.areas){const old=db.areas.find(x=>x.id===a.id);if(!old)db.areas.push(clone(a));else if(['a3','a5','a6','a16','a17'].includes(a.id))old.name=a.name}db.foodAreas=Array.isArray(db.foodAreas)?db.foodAreas:[];for(const master of FOOD_MASTER){let target=db.foodAreas.find(x=>x.areaId===master.areaId);if(!target){db.foodAreas.push(clone(master));continue}target.fixed=Array.isArray(target.fixed)?target.fixed:[];target.candidates=Array.isArray(target.candidates)?target.candidates:[];target.personal=Array.isArray(target.personal)?target.personal:[];for(const key of ['fixed','candidates','personal'])for(const name of master[key]){for(const other of ['fixed','candidates','personal'])if(other!==key)target[other]=target[other].filter(x=>x!==name);if(!target[key].includes(name))target[key].push(name)}}}function migrateDb(){db.places=(db.places||[]).map(p=>({...p,restaurants:Array.isArray(p.restaurants)?p.restaurants:[]}));if((db.version||0)<4)mergeFoodMaster();db.version=4;localStorage.setItem(KEY,JSON.stringify(db))}function save(msg='저장됐어요'){localStorage.setItem(KEY,JSON.stringify(db));renderAll();toast(msg)}function uid(p='id'){return p+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function areaName(id){return db.areas.find(x=>x.id===id)?.name||'생활권 미지정'}function seasonName(id){return db.seasons.find(x=>x.id===id)?.name||'시즌 미지정'}function placeById(id){return db.places.find(x=>x.id===id)}function fmtDate(v){if(!v)return '';const [y,m,d]=v.split('-');return `${y}.${m}.${d}`}function latestVisit(p){return [...(p.visits||[])].sort().at(-1)||''}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1400)}

function foodCount(){return (db.foodAreas||[]).reduce((n,f)=>n+(f.fixed||[]).length+(f.candidates||[]).length+(f.personal||[]).length,0)}function foodAreaByArea(areaId){return (db.foodAreas||[]).find(f=>f.areaId===areaId)}function foodAreaForPlace(p){return foodAreaByArea(p.areaId)}function foodSummary(f){if(!f)return '<span class="muted">연결된 맛집 없음</span>';const all=[...(f.fixed||[]),...(f.candidates||[]),...(f.personal||[])];return all.length?all.slice(0,5).map(x=>`<span class="pill">${esc(x)}</span>`).join('')+(all.length>5?` <span class="muted">외 ${all.length-5}곳</span>`:''):'<span class="muted">등록된 맛집 없음</span>'}

function renderHome(){const visited=db.places.filter(p=>(p.visits||[]).length);const total=db.places.filter(p=>p.title!=='자유탐방').length;const done=visited.filter(p=>p.title!=='자유탐방').length;const pct=total?Math.round(done/total*100):0;const visitTotal=db.places.reduce((n,p)=>n+(p.visits||[]).length,0);const recent=[...visited].sort((a,b)=>latestVisit(b).localeCompare(latestVisit(a))).slice(0,4);const rings=db.seasons.map(s=>{const ps=s.placeIds.map(placeById).filter(Boolean).filter(p=>p.title!=='자유탐방'),d=ps.filter(p=>(p.visits||[]).length).length,p=ps.length?Math.round(d/ps.length*100):0;return `<div class="ring"><div class="ring-circle" style="--p:${p}"><span>${p}%</span></div><div class="muted">${esc(s.name)}<br>${d}/${ps.length}</div></div>`}).join('');document.getElementById('home').innerHTML=`<div class="hero"><div class="row"><div class="grow"><div class="title">전체 진행률</div><div class="hero-number">${pct}%</div><div class="progress"><i style="width:${pct}%"></i></div><div class="muted" style="margin-top:8px">${done} / ${total}곳 방문 완료</div></div><div style="font-size:76px">👨‍👩‍👧</div></div></div><div class="card"><div class="section-head"><h2>시즌 진행률</h2><span class="muted">전체 ${db.seasons.length}개 시즌</span></div><div class="season-rings">${rings}</div></div><div class="dashboard-grid"><div class="dash-card area">${dashMenu('menuArea','area')}<div class="dash-icon">🗺️</div><h2>생활권</h2><div class="muted">지역별 코스로 편리하게 탐색해요</div><span class="dash-count">${db.areas.length}개 지역</span><div class="dash-actions"><button class="btn" onclick="openAreaEditor()">➕ 추가</button><button class="btn" onclick="switchTab('areas')">✏ 수정</button><button class="btn primary" onclick="switchTab('areas')">보기</button></div></div><div class="dash-card season">${dashMenu('menuSeason','season')}<div class="dash-icon">🗓️</div><h2>시즌</h2><div class="muted">테마별 추천 코스로 알차게 계획해요</div><span class="dash-count">${db.seasons.length}개 시즌</span><div class="dash-actions"><button class="btn" onclick="openSeasonEditor()">➕ 추가</button><button class="btn" onclick="switchTab('seasons')">✏ 수정</button><button class="btn primary" onclick="switchTab('seasons')">보기</button></div></div><div class="dash-card food">${dashMenu('menuFood','food')}<div class="dash-icon">🍲</div><h2>맛집</h2><div class="muted">생활권별 추천 맛집으로 든든하게</div><span class="dash-count">${foodCount()}개 맛집</span><div class="dash-actions"><button class="btn" onclick="openFoodEditor()">➕ 추가</button><button class="btn" onclick="switchTab('food')">✏ 수정</button><button class="btn primary" onclick="switchTab('food')">보기</button></div></div><div class="dash-card visitcard">${dashMenu('menuVisit','visit')}<div class="dash-icon">📘</div><h2>방문기록</h2><div class="muted">우리 가족의 소중한 추억을 기록해요</div><span class="dash-count">총 ${visitTotal}회 방문</span><div class="dash-actions"><button class="btn" onclick="openVisitEditor()">➕ 추가</button><button class="btn" onclick="switchTab('visits')">✏ 수정</button><button class="btn primary" onclick="switchTab('visits')">보기</button></div></div></div><div class="card"><div class="section-head"><h2>최근 방문 기록</h2><button class="btn small" onclick="switchTab('visits')">더보기 ›</button></div>${recent.length?recent.map(placeMini).join(''):'<div class="empty">아직 방문기록이 없습니다.</div>'}</div>`}

function renderSeasons(){document.getElementById('seasons').innerHTML=`<div class="card"><div class="section-head"><h2>시즌</h2><button class="btn primary" onclick="openSeasonEditor()">＋ 추가</button></div><div class="muted">시즌과 장소는 모두 수정·삭제할 수 있습니다.</div></div>`+db.seasons.map((s,si)=>`<div class="card"><div class="row"><div class="grow"><div class="title">${esc(s.name)}</div><div class="muted">${s.placeIds.length}개 장소</div></div><button class="btn small" onclick="moveSeason(${si},-1)">↑</button><button class="btn small" onclick="moveSeason(${si},1)">↓</button><button class="btn small" onclick="openSeasonEditor('${s.id}')">수정</button></div>${s.placeIds.map(id=>placeById(id)).filter(Boolean).map(placeMini).join('')}<button class="btn primary" onclick="openPlaceEditor('', '${s.id}')">＋ 이 시즌에 장소 추가</button></div>`).join('');hydrateThumbs()}
function renderAreas(){document.getElementById('areas').innerHTML=`<div class="card"><div class="section-head"><h2>생활권</h2><button class="btn primary" onclick="openAreaEditor()">＋ 추가</button></div><div class="muted">각 생활권의 장소와 맛집이 함께 연결됩니다.</div></div>`+db.areas.map(a=>{const ps=db.places.filter(p=>p.areaId===a.id),f=foodAreaByArea(a.id);return `<div class="card"><div class="row"><div class="grow title">${esc(a.name)}</div><button class="btn small" onclick="openAreaEditor('${a.id}')">생활권 수정</button></div><div class="list-row"><b>🍜 연결 맛집</b><div style="margin-top:5px">${foodSummary(f)}</div><button class="btn small gold" style="margin-top:8px" onclick="openFoodByArea('${a.id}')">맛집 관리</button></div>${ps.length?ps.map(placeMini).join(''):'<div class="empty">연결된 장소 없음</div>'}<button class="btn primary" onclick="openPlaceEditor('', '', '${a.id}')">＋ 이 생활권에 장소 추가</button></div>`}).join('');hydrateThumbs()}
function renderFood(){const groups=db.areas.map(a=>({a,f:foodAreaByArea(a.id)}));document.getElementById('food').innerHTML=`<div class="card"><div class="section-head"><h2>맛집</h2><button class="btn primary" onclick="openFoodEditor()">＋ 생활권 맛집 추가</button></div><div class="muted">맛집은 생활권과 자동 연결되고, 그 생활권의 모든 장소에서 함께 표시됩니다.</div></div>`+groups.map(({a,f})=>`<div class="card"><div class="row"><div class="grow"><div class="title">${esc(a.name)}</div><div class="muted">연결 장소 ${db.places.filter(p=>p.areaId===a.id).length}곳</div></div><button class="btn small" onclick="openFoodByArea('${a.id}')">${f?'수정':'＋ 등록'}</button></div>${f?(foodGroup('👑 픽스',f.fixed)+foodGroup('📍 후보군',f.candidates)+foodGroup('⭐ 개인픽',f.personal)):'<div class="empty">등록된 맛집 없음</div>'}</div>`).join('')}
function foodGroup(t,a){return a?.length?`<div class="list-row"><b>${t}</b><div>${a.map(x=>`<span class="pill">${esc(x)}</span>`).join('')}</div></div>`:''}
function renderVisits(){const rows=[];db.places.forEach(p=>(p.visits||[]).forEach(d=>rows.push({p,d})));rows.sort((a,b)=>b.d.localeCompare(a.d));document.getElementById('visits').innerHTML=`<div class="card"><div class="section-head"><h2>📖 방문기록</h2><button class="btn primary" onclick="openVisitEditor()">＋ 방문 추가</button></div>${rows.length?rows.map(x=>`<div class="visit-row"><div><b>${esc(x.p.title)}</b><div class="muted">${fmtDate(x.d)}</div></div><button class="btn small" onclick="openVisitEditor('${x.p.id}','${x.d}')">수정</button><button class="btn small danger" onclick="deleteVisitFromManager('${x.p.id}','${x.d}')">삭제</button></div>`).join(''):'<div class="empty">아직 방문기록이 없습니다.</div>'}</div>`}
function openVisitEditor(pid='',date=''){const p=pid?placeById(pid):null;openModal(date?'방문기록 수정':'방문기록 추가',`<label class="field">장소<select id="ve_place">${db.places.filter(x=>x.title!=='자유탐방').map(x=>`<option value="${x.id}" ${x.id===pid?'selected':''}>${esc(x.title)}</option>`).join('')}</select></label><label class="field">방문 날짜<input id="ve_date" type="date" value="${date||new Date().toISOString().slice(0,10)}"></label><button class="btn primary" onclick="saveVisitEditor('${pid}','${date}')">저장</button>`) }
function saveVisitEditor(oldPid,oldDate){const pid=ve_place.value,d=ve_date.value;if(!pid||!d)return alert('장소와 날짜를 입력하세요.');if(oldPid&&oldDate){const old=placeById(oldPid);old.visits=old.visits.filter(x=>x!==oldDate)}const p=placeById(pid);if(!p.visits.includes(d))p.visits.push(d);closeModal();save('방문기록을 저장했어요');switchTab('visits')}
function deleteVisitFromManager(pid,d){if(!confirm(fmtDate(d)+' 방문기록을 삭제할까요?'))return;const p=placeById(pid);p.visits=p.visits.filter(x=>x!==d);save('방문기록을 삭제했어요')}
function renderAdmin(){document.getElementById('admin').innerHTML=`<div class="card"><h2>⚙️ 설정 및 관리</h2><div class="grid"><button class="btn primary" onclick="openPlaceEditor()">＋ 장소 추가</button><button class="btn primary" onclick="openSeasonEditor()">＋ 시즌 추가</button><button class="btn primary" onclick="openAreaEditor()">＋ 생활권 추가</button><button class="btn primary" onclick="openFoodEditor()">＋ 맛집 추가</button><button class="btn primary" onclick="openVisitEditor()">＋ 방문기록 추가</button><button class="btn" onclick="exportBackup()">📤 전체 백업</button><label><input id="restoreFile" type="file" accept=".json" hidden onchange="restoreBackup(event)"><button class="btn" type="button" onclick="restoreFile.click()">📥 백업 복원</button></label></div></div><div class="card danger-zone"><h3>초기화</h3><p class="muted">직접 추가한 장소와 방문기록까지 모두 지워집니다. 확인창을 두 번 띄웁니다. 인간의 충동적 클릭을 신뢰할 수 없어서 그렇습니다.</p><button class="btn danger" onclick="resetAll()">초기 데이터로 되돌리기</button></div>`}
function openModal(title,html){modalTitle.textContent=title;modalBody.innerHTML=html;modal.classList.add('show')}function closeModal(){modal.classList.remove('show')}
async function openPlace(id){const p=placeById(id);if(!p)return;const img=await imageGet('cover:'+p.id);openModal(p.title,`<div class="cover" id="detailCover">${img?`<img src="${img}">`:'대표사진을 추가하세요'}</div><div class="row" style="margin-top:9px"><label class="btn primary">대표사진 추가/변경<input type="file" accept="image/*" hidden onchange="saveCover(event,'${p.id}')"></label>${img?`<button class="btn danger" onclick="deleteCover('${p.id}')">사진 삭제</button>`:''}<button class="btn" onclick="openPlaceEditor('${p.id}')">전체 수정</button></div><div class="card"><div class="title">${esc(p.id)} · ${esc(seasonName(p.seasonId))}</div><div class="muted">${esc(areaName(p.areaId))}</div>${p.address?`<p><b>주소</b><br>${esc(p.address)}</p>`:''}${p.summary?`<p>${esc(p.summary)}</p>`:''}</div>${infoCard(p)}${editableListCard('⭐ 꼭 해야 할 것',p.checklist,p.id,'checklist')}${editableListCard('📷 사진명소',p.photoSpots,p.id,'photoSpots',true)}${restaurantCard(p)}${notesCard(p)}${visitCard(p)}<div class="card danger-zone"><button class="btn danger" onclick="deletePlace('${p.id}')">이 장소 삭제</button></div>`)}
function infoCard(p){return `<div class="card"><div class="section-head"><h3>🕒 관람정보</h3><button class="btn small" onclick="openPlaceEditor('${p.id}')">수정</button></div>${p.hours?`<p style="white-space:pre-line">${esc(p.hours)}</p>`:''}${p.fee?`<p><b>요금</b> ${esc(p.fee)}</p>`:''}${p.duration?`<p><b>추천시간</b> ${esc(p.duration)}</p>`:''}${!p.hours&&!p.fee&&!p.duration?'<div class="empty">관람정보를 입력하세요.</div>':''}</div>`}
function editableListCard(title,list,pid,key,photo=false){return `<div class="card"><div class="section-head"><h3>${title}</h3><button class="btn small primary" onclick="addListItem('${pid}','${key}')">＋ 추가</button></div>${list.length?list.map((x,i)=>`<div class="checkline"><input type="checkbox" ${x.done?'checked':''} onchange="toggleList('${pid}','${key}',${i},this.checked)"><div class="grow">${esc(x.text)}${photo?`<div class="row" style="margin-top:7px"><label class="btn small">사진 첨부<input type="file" accept="image/*" hidden onchange="saveSpotPhoto(event,'${pid}','${x.id}')"></label><button class="btn small" onclick="showSpotPhoto('${pid}','${x.id}')">사진 보기</button></div>`:''}</div><button class="btn small" onclick="editListItem('${pid}','${key}',${i})">수정</button><button class="btn small danger" onclick="deleteListItem('${pid}','${key}',${i})">삭제</button></div>`).join(''):'<div class="empty">아직 항목이 없습니다.</div>'}</div>`}
function restaurantCard(p){const f=foodAreaForPlace(p);return `<div class="card"><div class="section-head"><h3>🍜 연결 맛집</h3><button class="btn small gold" onclick="openFoodByArea('${p.areaId}')">생활권 맛집 관리</button></div><div class="muted">${esc(areaName(p.areaId))} 맛집이 자동으로 표시됩니다.</div>${f?(foodGroup('👑 픽스',f.fixed)+foodGroup('📍 후보군',f.candidates)+foodGroup('⭐ 개인픽',f.personal)):'<div class="empty">이 생활권에 등록된 맛집이 없습니다.</div>'}<div class="section-head" style="margin-top:12px"><h3>📌 이 장소 전용</h3><button class="btn small primary" onclick="addRestaurant('${p.id}')">＋ 추가</button></div>${p.restaurants.length?p.restaurants.map((r,i)=>`<div class="list-row row"><div class="grow"><b>${esc(r.name)}</b><div class="muted">${esc(r.type||'후보군')}</div></div><button class="btn small" onclick="editRestaurant('${p.id}',${i})">수정</button><button class="btn small danger" onclick="deleteRestaurant('${p.id}',${i})">삭제</button></div>`).join(''):'<div class="empty">장소에만 따로 연결할 맛집이 있을 때 추가하세요.</div>'}</div>`}
function notesCard(p){return `<div class="card"><h3>📝 가족 관람평</h3>${Object.entries(p.notes||{}).map(([n,v])=>`<label class="field">${esc(n)}<textarea oninput="saveNote('${p.id}','${n}',this.value)">${esc(v)}</textarea></label>`).join('')}</div>`}
function visitCard(p){const visits=[...(p.visits||[])].sort().reverse();return `<div class="card"><div class="section-head"><h3>📅 방문기록</h3><button class="btn primary small" onclick="addVisit('${p.id}')">＋ 방문 날짜</button></div><p><b>방문 ${visits.length}회</b>${visits.length?` · 최근 ${fmtDate(visits[0])}`:''}</p>${visits.length?visits.map(v=>`<div class="visit"><div class="grow">${fmtDate(v)}</div><button class="btn small" onclick="editVisit('${p.id}','${v}')">수정</button><button class="btn small danger" onclick="deleteVisit('${p.id}','${v}')">삭제</button></div>`).join(''):'<div class="empty">방문 날짜를 기록하세요.</div>'}</div>`}
function openPlaceEditor(id='',presetSeason='',presetArea=''){const p=id?clone(placeById(id)):{id:nextPlaceCode(),title:'',seasonId:presetSeason||db.seasons[0]?.id||'',areaId:presetArea||db.areas[0]?.id||'',address:'',summary:'',hours:'',fee:'',duration:'',checklist:[],photoSpots:[],restaurants:[],notes:{'사과머리':'','꼬꼬마':'','아기천사':''},visits:[],createdAt:new Date().toISOString()};openModal(id?'장소 수정':'새 장소 추가',`<div class="form-grid"><label class="field">장소 코드<input id="pe_id" value="${esc(p.id)}" ${id?'readonly':''}></label><label class="field">장소 이름<input id="pe_title" value="${esc(p.title)}"></label><label class="field">시즌<select id="pe_season">${db.seasons.map(s=>`<option value="${s.id}" ${s.id===p.seasonId?'selected':''}>${esc(s.name)}</option>`).join('')}</select></label><label class="field">생활권<select id="pe_area">${db.areas.map(a=>`<option value="${a.id}" ${a.id===p.areaId?'selected':''}>${esc(a.name)}</option>`).join('')}</select></label></div><label class="field">주소<input id="pe_address" value="${esc(p.address)}"></label><label class="field">기본 설명<textarea id="pe_summary">${esc(p.summary)}</textarea></label><label class="field">운영시간·휴관일<textarea id="pe_hours">${esc(p.hours)}</textarea></label><div class="form-grid"><label class="field">요금<input id="pe_fee" value="${esc(p.fee)}"></label><label class="field">추천 관람시간<input id="pe_duration" value="${esc(p.duration)}"></label></div><button class="btn primary" onclick="savePlaceEditor('${id}')">저장</button>`) }
function nextPlaceCode(){let n=1;const ids=new Set(db.places.map(p=>p.id));while(ids.has('P'+String(n).padStart(3,'0')))n++;return 'P'+String(n).padStart(3,'0')}
function savePlaceEditor(oldId){const id=pe_id.value.trim(),title=pe_title.value.trim();if(!id||!title)return alert('장소 코드와 이름을 입력하세요.');if(!oldId&&db.places.some(p=>p.id===id))return alert('이미 있는 장소 코드입니다.');if(oldId){const p=placeById(oldId);const oldSeason=p.seasonId;Object.assign(p,{title,seasonId:pe_season.value,areaId:pe_area.value,address:pe_address.value,summary:pe_summary.value,hours:pe_hours.value,fee:pe_fee.value,duration:pe_duration.value});if(oldSeason!==p.seasonId){db.seasons.find(s=>s.id===oldSeason).placeIds=db.seasons.find(s=>s.id===oldSeason).placeIds.filter(x=>x!==oldId);db.seasons.find(s=>s.id===p.seasonId).placeIds.push(oldId)}}else{const p={id,title,seasonId:pe_season.value,areaId:pe_area.value,address:pe_address.value,summary:pe_summary.value,hours:pe_hours.value,fee:pe_fee.value,duration:pe_duration.value,checklist:[],photoSpots:[],restaurants:[],notes:{'사과머리':'','꼬꼬마':'','아기천사':''},visits:[],createdAt:new Date().toISOString()};db.places.push(p);db.seasons.find(s=>s.id===p.seasonId)?.placeIds.push(id)}closeModal();save('장소가 저장됐어요')}
function deletePlace(id){if(!confirm('이 장소와 방문기록을 삭제할까요?'))return;db.places=db.places.filter(p=>p.id!==id);db.seasons.forEach(s=>s.placeIds=s.placeIds.filter(x=>x!==id));imageDeletePrefix(id);closeModal();save('장소를 삭제했어요')}
function addListItem(pid,key){const t=prompt('추가할 내용을 입력하세요.');if(!t)return;placeById(pid)[key].push({id:uid(key==='photoSpots'?'p':'c'),text:t,done:false});save();openPlace(pid)}function editListItem(pid,key,i){const p=placeById(pid),t=prompt('내용 수정',p[key][i].text);if(t===null)return;p[key][i].text=t.trim();save();openPlace(pid)}function deleteListItem(pid,key,i){if(!confirm('이 항목을 삭제할까요?'))return;placeById(pid)[key].splice(i,1);save();openPlace(pid)}function toggleList(pid,key,i,v){placeById(pid)[key][i].done=v;localStorage.setItem(KEY,JSON.stringify(db));renderAll()}
function addRestaurant(pid){const name=prompt('맛집 이름');if(!name)return;const type=prompt('구분: 픽스 / 후보군 / 개인픽','후보군')||'후보';placeById(pid).restaurants.push({name,type});save();openPlace(pid)}function editRestaurant(pid,i){const r=placeById(pid).restaurants[i],name=prompt('맛집 이름',r.name);if(name===null)return;const type=prompt('구분',r.type)||r.type;Object.assign(r,{name,type});save();openPlace(pid)}function deleteRestaurant(pid,i){placeById(pid).restaurants.splice(i,1);save();openPlace(pid)}function saveNote(pid,n,v){placeById(pid).notes[n]=v;localStorage.setItem(KEY,JSON.stringify(db))}
function addVisit(pid){const d=prompt('방문 날짜를 입력하세요. 예: 2026-07-22',new Date().toISOString().slice(0,10));if(!d)return;if(!/^\d{4}-\d{2}-\d{2}$/.test(d))return alert('날짜 형식은 2026-07-22처럼 입력하세요.');const p=placeById(pid);if(!p.visits.includes(d))p.visits.push(d);save('방문 날짜를 기록했어요');openPlace(pid)}function editVisit(pid,old){const d=prompt('방문 날짜 수정',old);if(!d)return;const p=placeById(pid);p.visits=p.visits.filter(x=>x!==old);if(!p.visits.includes(d))p.visits.push(d);save();openPlace(pid)}function deleteVisit(pid,d){if(!confirm(fmtDate(d)+' 방문기록을 삭제할까요?'))return;const p=placeById(pid);p.visits=p.visits.filter(x=>x!==d);save();openPlace(pid)}
function openSeasonEditor(id=''){const s=id?db.seasons.find(x=>x.id===id):{name:''};openModal(id?'시즌 수정':'시즌 추가',`<label class="field">시즌 이름<input id="se_name" value="${esc(s.name)}"></label><button class="btn primary" onclick="saveSeasonEditor('${id}')">저장</button>${id?'<button class="btn danger" onclick="deleteSeason(\''+id+'\')">시즌 삭제</button>':''}`)}function saveSeasonEditor(id){const name=se_name.value.trim();if(!name)return;if(id)db.seasons.find(x=>x.id===id).name=name;else db.seasons.push({id:uid('s'),name,placeIds:[]});closeModal();save()}function deleteSeason(id){const s=db.seasons.find(x=>x.id===id);if(s.placeIds.length)return alert('시즌 안의 장소를 다른 시즌으로 옮기거나 삭제한 뒤 지울 수 있습니다.');if(confirm('이 시즌을 삭제할까요?')){db.seasons=db.seasons.filter(x=>x.id!==id);closeModal();save()}}function moveSeason(i,d){const j=i+d;if(j<0||j>=db.seasons.length)return;[db.seasons[i],db.seasons[j]]=[db.seasons[j],db.seasons[i]];save()}
function openAreaEditor(id=''){const a=id?db.areas.find(x=>x.id===id):{name:''};openModal(id?'생활권 수정':'생활권 추가',`<label class="field">생활권 이름<input id="ae_name" value="${esc(a.name)}"></label><button class="btn primary" onclick="saveAreaEditor('${id}')">저장</button>${id?'<button class="btn danger" onclick="deleteArea(\''+id+'\')">생활권 삭제</button>':''}`)}function saveAreaEditor(id){const name=ae_name.value.trim();if(!name)return;if(id)db.areas.find(x=>x.id===id).name=name;else db.areas.push({id:uid('a'),name});closeModal();save()}function deleteArea(id){if(db.places.some(p=>p.areaId===id))return alert('연결된 장소가 있어 삭제할 수 없습니다. 장소의 생활권을 먼저 변경하세요.');if(confirm('삭제할까요?')){db.areas=db.areas.filter(x=>x.id!==id);closeModal();save()}}
function openFoodByArea(areaId){const f=foodAreaByArea(areaId);openFoodEditor(f?.id||'',areaId)}function openFoodEditor(id='',presetArea=''){const f=id?db.foodAreas.find(x=>x.id===id):{areaId:presetArea||db.areas[0]?.id||'',fixed:[],candidates:[],personal:[]};openModal(id?'맛집 수정':'생활권 맛집 등록',`<label class="field">생활권<select id="fe_area">${db.areas.map(a=>`<option value="${a.id}" ${a.id===f.areaId?'selected':''}>${esc(a.name)}</option>`).join('')}</select></label><label class="field">픽스맛집 (한 줄에 하나)<textarea id="fe_fixed">${esc((f.fixed||[]).join('\n'))}</textarea></label><label class="field">후보군 맛집 (한 줄에 하나)<textarea id="fe_candidates">${esc((f.candidates||[]).join('\n'))}</textarea></label><label class="field">개인픽 (한 줄에 하나)<textarea id="fe_personal">${esc((f.personal||[]).join('\n'))}</textarea></label><button class="btn primary" onclick="saveFoodEditor('${id}')">저장</button>${id?'<button class="btn danger" onclick="deleteFood(\''+id+'\')">삭제</button>':''}`)}function lines(v){return [...new Set(v.split('\n').map(x=>x.trim()).filter(Boolean))]}function saveFoodEditor(id){const data={areaId:fe_area.value,fixed:lines(fe_fixed.value),candidates:lines(fe_candidates.value),personal:lines(fe_personal.value)};const duplicate=db.foodAreas.find(x=>x.areaId===data.areaId&&x.id!==id);if(duplicate){if(!confirm('이 생활권에 이미 맛집 목록이 있습니다. 기존 목록을 지금 내용으로 바꿀까요?'))return;Object.assign(duplicate,data);if(id)db.foodAreas=db.foodAreas.filter(x=>x.id!==id)}else if(id)Object.assign(db.foodAreas.find(x=>x.id===id),data);else db.foodAreas.push({id:uid('f'),...data});closeModal();save('생활권 맛집이 연결됐어요')}function deleteFood(id){if(confirm('이 맛집 묶음을 삭제할까요? 연결된 장소에서는 더 이상 표시되지 않습니다.')){db.foodAreas=db.foodAreas.filter(x=>x.id!==id);closeModal();save()}}
const IDB='SundayPMMuseumImages',STORE='images';function imageDb(){return new Promise((res,rej)=>{const r=indexedDB.open(IDB,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}async function imageSet(k,v){const d=await imageDb();return new Promise((res,rej)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).put(v,k);t.oncomplete=res;t.onerror=()=>rej(t.error)})}async function imageGet(k){const d=await imageDb();return new Promise((res,rej)=>{const r=d.transaction(STORE).objectStore(STORE).get(k);r.onsuccess=()=>res(r.result||'');r.onerror=()=>rej(r.error)})}async function imageDelete(k){const d=await imageDb();return new Promise(res=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).delete(k);t.oncomplete=res})}async function imageEntries(){const d=await imageDb();return new Promise(res=>{const r=d.transaction(STORE).objectStore(STORE).getAllKeys();r.onsuccess=async()=>{const keys=r.result;const out={};for(const k of keys)out[k]=await imageGet(k);res(out)}})}async function imageDeletePrefix(pid){const all=await imageEntries();for(const k of Object.keys(all))if(k.includes(':'+pid)||k.startsWith('spot:'+pid+':'))await imageDelete(k)}
function fileData(file,max=1400){return new Promise((res,rej)=>{const img=new Image(),r=new FileReader();r.onload=()=>{img.onload=()=>{let w=img.width,h=img.height;if(Math.max(w,h)>max){const q=max/Math.max(w,h);w=Math.round(w*q);h=Math.round(h*q)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.82))};img.onerror=rej;img.src=r.result};r.onerror=rej;r.readAsDataURL(file)})}
async function saveCover(e,pid){const f=e.target.files[0];if(!f)return;const d=await fileData(f);await imageSet('cover:'+pid,d);toast('대표사진을 저장했어요');openPlace(pid);renderAll()}async function deleteCover(pid){await imageDelete('cover:'+pid);openPlace(pid);renderAll()}async function saveSpotPhoto(e,pid,sid){const f=e.target.files[0];if(!f)return;await imageSet(`spot:${pid}:${sid}`,await fileData(f));toast('사진을 저장했어요')}async function showSpotPhoto(pid,sid){const d=await imageGet(`spot:${pid}:${sid}`);if(!d)return alert('첨부된 사진이 없습니다.');openModal('사진 보기',`<div class="cover"><img src="${d}"></div><button class="btn danger" onclick="deleteSpotPhoto('${pid}','${sid}')">사진 삭제</button>`)}async function deleteSpotPhoto(pid,sid){await imageDelete(`spot:${pid}:${sid}`);closeModal();toast('사진을 삭제했어요')}
async function exportBackup(){const payload={app:'SundayPMMuseum',exportedAt:new Date().toISOString(),db,images:await imageEntries()};const blob=new Blob([JSON.stringify(payload)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SundayPMMuseum_backup_'+new Date().toISOString().slice(0,10)+'.json';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}async function restoreBackup(e){const f=e.target.files[0];if(!f)return;try{const p=JSON.parse(await f.text());if(!p.db)throw 0;db=p.db;localStorage.setItem(KEY,JSON.stringify(db));if(p.images)for(const [k,v] of Object.entries(p.images))await imageSet(k,v);renderAll();switchTab('home');toast('백업을 복원했어요')}catch(err){alert('올바른 백업 파일이 아닙니다.')}e.target.value=''}function resetAll(){if(!confirm('정말 초기화할까요?'))return;if(!confirm('한 번 더 확인합니다. 직접 입력한 기록이 모두 사라집니다.'))return;db=clone(INITIAL);localStorage.setItem(KEY,JSON.stringify(db));renderAll();switchTab('home');toast('초기화했어요')}
try{renderAll();hydrateThumbs()}catch(err){
  console.error('초기 화면 복구 오류',err);
  const home=document.getElementById('home');
  if(home) home.innerHTML='<div class="card"><h2>홈 화면을 복구했습니다</h2><p class="muted">저장 데이터 형식을 정리하는 중 오류가 발생했습니다.</p><button class="btn primary" onclick="localStorage.removeItem(KEY);location.reload()">기록을 유지한 채 기본 화면 다시 불러오기</button></div>';
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').then(r=>r.update()).catch(()=>{});
}
</script></body></html>

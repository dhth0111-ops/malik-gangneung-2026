var DEFAULTS=[{"id":"P001","title":"토마토 마리네이드","desc":"상큼하고 산뜻한 저장 반찬","category":"반찬","ingredients":["토마토 2kg","양파 1개","올리브유 10T","레몬즙 또는 깔라만시액 4T","3배식초 4T","허브솔트 12번 톡톡","파슬리","프락토올리고당 7T","바질페스토 반 병"],"steps":["토마토를 손질한다.","양파를 잘게 다진다.","모든 재료를 볼에 넣고 섞는다.","냉장 숙성한다."],"notes":"차갑게 숙성해 먹는다.","image":"","favorite":false},{"id":"P002","title":"누룽지 닭백숙","desc":"구수하고 든든한 보양식","category":"보양식","ingredients":["닭장각 2kg","마늘 200g","백숙팩","대추","부추","찹쌀 2컵"],"steps":["닭장각을 끓는 물에 데친다.","찹쌀밥을 지어 프라이팬에 물을 묻혀 얇고 고르게 편다.","프라이팬은 인덕션 9에서 10분, 8에서 2분 굽거나 에어프라이어 180도에서 20분 뒤 10분 더 굽는다.","압력솥에 닭, 마늘, 대추를 넣고 강불로 가열한다.","추가 돌면 인덕션 8에서 10분, 6에서 15분 익힌다.","냄비에 누룽지와 백숙을 넣고 끓인 뒤 부추로 마무리한다."],"notes":"에어프라이어 누룽지는 중약불로 10분 끓인다. 프라이팬 누룽지는 처음부터 넣어 죽처럼 끓인다.","image":"","favorite":false},{"id":"P003","title":"얼갈이무침","desc":"된장 향이 살아있는 밥반찬","category":"반찬","ingredients":["데친 얼갈이 두 줌","굵은소금 1T (데칠 때)","된장 1T","멸치액젓 또는 참치액 1T"],"steps":["끓는 물에 굵은소금 1T를 넣고 얼갈이를 데친다.","찬물에 헹군 뒤 물기를 꼭 짠다.","된장과 멸치액젓 또는 참치액을 넣어 버무린다."],"notes":"물기를 충분히 짠다.","image":"","favorite":false},{"id":"P004","title":"가지나물무침","desc":"부드럽고 담백한 가지 반찬","category":"반찬","ingredients":["가지 4개","다진 마늘 1/2T","국간장 2T","참기름 1T","참치액 1T","깨소금"],"steps":["가지를 먹기 좋게 썬다.","가지를 익힌 뒤 먹기 좋게 찢는다.","양념을 넣고 살살 버무린다."],"notes":"너무 세게 무치지 않는다.","image":"","favorite":false},{"id":"P005","title":"열무지짐","desc":"푹 익혀 더 구수한 집밥 반찬","category":"반찬","ingredients":["씻은 열무 두 줌","쌀뜨물","된장 1T","참치액 1T","멸치가루 1T","다진마늘 1T","들기름 1T"],"steps":["열무와 쌀뜨물, 된장, 참치액, 멸치가루, 다진마늘을 냄비에 넣는다.","강불에서 끓인다.","끓으면 뚜껑을 덮고 중약불에서 30분 조린다.","불을 끄고 들기름 1T를 넣는다."],"notes":"코인육수 1개를 넣어도 된다.","image":"","favorite":false},{"id":"P006","title":"닭도리탕","desc":"매콤하고 진한 가족 인기 메뉴","category":"국·찌개","ingredients":["닭장각 4개","감자 4개","양파 1개","청양고추 3개","다진마늘","대파","물 700ml","쌈장 1T","간장 10T","고춧가루 2T","설탕 4T","불린 당면"],"steps":["궁중팬을 강불로 달군 뒤 닭장각을 한 면당 3~5분씩 노릇하게 굽는다.","다진마늘과 대파를 넣고 볶는다.","간장 10T를 넣고 강불에서 졸이며 섞고, 끓으면 중불로 줄인다.","불을 낮춰 고춧가루 2T와 설탕 4T를 넣고 고추기름을 낸다.","물 700ml와 쌈장 1T를 넣고 뚜껑을 덮어 강불에서 10분 끓인다.","감자, 양파, 청양고추를 넣고 뚜껑을 덮어 중불에서 15분 끓인다.","불린 당면은 마지막에 넣는다."],"notes":"고춧가루가 탈 수 있으니 불을 약하게 조절한다. 시판 쌈장을 사용해도 된다.","image":"","favorite":false},{"id":"P007","title":"강된장호박잎쌈밥","desc":"구수한 강된장을 올린 호박잎쌈밥","category":"일품요리","ingredients":["두부 1모","애호박 1개","팽이버섯 2봉","양파 1개","청양고추 4개","된장 2T","쌈장 1T","물 250ml","코인육수 2개","호박잎","귀리밥","참치"],"steps":["양파, 애호박, 팽이버섯, 청양고추를 다진다.","다진 채소와 된장 2T, 쌈장 1T를 볶는다.","물 250ml와 코인육수 2개를 넣고 자작하게 끓인다.","두부를 넣고 한 번 더 끓인다.","호박잎은 식초물에 담가 씻는다.","찜기의 물이 끓으면 호박잎을 넣고 5분 찐다.","찐 호박잎을 식힌다.","귀리밥에 참치를 넣어 섞는다.","호박잎으로 밥을 감싸고 강된장을 올린다."],"notes":"강된장이 너무 되직하면 물을 추가한다. 밥은 다른 잡곡밥으로 바꿔도 된다.","image":"","favorite":false},{"id":"P008","title":"고구마순나물","desc":"들깨가루를 듬뿍 넣은 고소한 나물","category":"반찬","ingredients":["고구마순 1봉지","삶는 물용 소금 1T","식용유 3바퀴","다진마늘","물 3T","참치액 2T","국간장 2T","코인육수 1개","들기름 1T","들깨가루 듬뿍","깨소금"],"steps":["끓는 물에 소금 1T를 넣고 고구마순을 넣는다.","넣자마자 한 번 뒤집어 골고루 연두빛이 나게 한다.","뚜껑을 덮고 중불에서 7분 삶는다.","찬물에 씻어 먹기 좋은 크기로 썬다.","팬에 식용유 3바퀴, 다진마늘, 고구마순을 넣는다.","물 3T, 참치액 2T, 국간장 2T, 코인육수 1개를 넣고 자작하게 끓인다.","들기름 1T와 들깨가루를 듬뿍 넣어 저어준다.","3분 더 익힌 뒤 깨소금을 뿌린다."],"notes":"삶을 때 넣자마자 한 번 뒤집어야 골고루 연두빛이 난다.","image":"","favorite":false},{"id":"P009","title":"감자볶음","desc":"살짝 데쳐 깔끔하게 볶은 감자채","category":"반찬","ingredients":["감자 3개","당근 1/2개","다진마늘","식용유","데치는 물용 소금","맛소금","참기름","깨소금"],"steps":["감자는 채 썰어 물에 담가둔다.","끓는 물에 소금을 넣고 감자를 살짝 데친 뒤 물기를 뺀다.","당근은 채 썬다.","팬에 기름을 두르고 다진마늘과 당근채를 볶는다.","감자를 넣고 투명해질 때까지 살짝 볶는다.","맛소금으로 간한다.","참기름과 깨소금을 뿌려 마무리한다."],"notes":"감자를 너무 오래 볶지 않고 투명해질 정도까지만 볶는다.","image":"","favorite":false},{"id":"P010","title":"소고기미역국","desc":"사태를 가득 넣어 푹 끓인 미역국","category":"국·찌개","ingredients":["사태 2kg","노브랜드 미역 1/4봉 (약 200g)","쌀뜨물","참기름","다진마늘","다시다 6T"],"steps":["미역을 충분히 불린다.","불린 미역을 참기름에 볶는다.","사태 2kg을 주먹 크기로 썬다.","쌀뜨물과 다시다 6T를 넣고 강불로 끓인다.","끓으면 인덕션 8로 줄여 1시간 끓인다.","담기 전에 고기를 먹기 좋게 썬다."],"notes":"간은 다시다로 맞춘다.","image":"","favorite":false}];
var KEY='yoriwang_v21_recipes',BACKUP_KEY='yoriwang_v21_recipes_backup',SEED_KEY='yoriwang_seed_version',SEED_VERSION='2.2',DB_NAME='yoriwang_kkokkoma_db',DB_STORE='appdata',DB_KEY='recipes';
var recipes=[],currentId=null,editingId=null,imageData='',db=null,activeFilter='전체';
function el(id){return document.getElementById(id)}function clone(v){return JSON.parse(JSON.stringify(v))}function esc(v){return String(v||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function inferCategory(title){if(/국|찌개|탕/.test(title))return '국·찌개';if(/김밥|쌈밥|볶음밥|덮밥|파스타|면/.test(title))return '일품요리';if(/백숙/.test(title))return '보양식';return '반찬'}
function normalize(r){return {id:String(r.id||''),title:String(r.title||''),desc:String(r.desc||''),category:r.category||inferCategory(String(r.title||'')),ingredients:Array.isArray(r.ingredients)?r.ingredients:[],steps:Array.isArray(r.steps)?r.steps:[],notes:String(r.notes||''),image:String(r.image||''),favorite:!!r.favorite}}
function validRecipes(v){return Array.isArray(v)&&v.every(function(r){return r&&typeof r.title==='string'&&Array.isArray(r.ingredients)&&Array.isArray(r.steps)})}function setStatus(t){el('saveStatus').textContent=t}
function openDB(){return new Promise(function(resolve){if(!window.indexedDB){resolve(null);return}var req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=function(){var d=req.result;if(!d.objectStoreNames.contains(DB_STORE))d.createObjectStore(DB_STORE)};req.onsuccess=function(){db=req.result;resolve(db)};req.onerror=function(){resolve(null)}})}
function idbGet(){return new Promise(function(resolve){if(!db){resolve(null);return}try{var tx=db.transaction(DB_STORE,'readonly'),req=tx.objectStore(DB_STORE).get(DB_KEY);req.onsuccess=function(){resolve(req.result||null)};req.onerror=function(){resolve(null)}}catch(e){resolve(null)}})}
function idbSet(v){return new Promise(function(resolve,reject){if(!db){resolve(false);return}try{var tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(v,DB_KEY);tx.oncomplete=function(){resolve(true)};tx.onerror=function(){reject(tx.error)}}catch(e){reject(e)}})}
function canonicalTitle(v){return String(v||'').trim().replace(/\s+/g,' ').toLowerCase()}
function sameList(a,b){return JSON.stringify(a||[])===JSON.stringify(b||[])}
function defaultEditScore(r,d){var score=0;if(r.image)score+=100;if(r.favorite)score+=25;if(r.desc!==d.desc)score+=10;if(r.category!==d.category)score+=5;if(r.notes!==d.notes)score+=20;if(!sameList(r.ingredients,d.ingredients))score+=40;if(!sameList(r.steps,d.steps))score+=40;return score}
function dedupeDefaultRecipes(){var defaultMap={};DEFAULTS.forEach(function(d){defaultMap[canonicalTitle(d.title)]=d});var groups={};recipes.forEach(function(r,i){var key=canonicalTitle(r.title);if(defaultMap[key]){if(!groups[key])groups[key]=[];groups[key].push({recipe:r,index:i})}});var remove={},replace={},removed=0;Object.keys(groups).forEach(function(key){var list=groups[key];if(list.length<2)return;var d=defaultMap[key],winner=list[0],best=defaultEditScore(winner.recipe,d);for(var i=1;i<list.length;i++){var score=defaultEditScore(list[i].recipe,d);if(score>best){winner=list[i];best=score}}var first=list[0].index;replace[first]=winner.recipe;list.forEach(function(entry){if(entry.index!==first){remove[entry.index]=true;removed++}})});if(!removed)return 0;recipes=recipes.map(function(r,i){return replace[i]||r}).filter(function(r,i){return !remove[i]});return removed}
function ensureUniqueIds(){var used={},changed=0,max=0;recipes.forEach(function(r){var n=parseInt(String(r.id||'').replace(/\D/g,''),10)||0;if(n>max)max=n});recipes.forEach(function(r){var id=String(r.id||'').trim();if(!id||used[id]){do{max++;id='P'+String(max).padStart(3,'0')}while(used[id]);r.id=id;changed++}used[id]=true});return changed}
function addNewDefaultsOnce(){if(localStorage.getItem(SEED_KEY)===SEED_VERSION)return 0;var titles={};recipes.forEach(function(r){titles[canonicalTitle(r.title)]=true});var added=0;DEFAULTS.forEach(function(d){var key=canonicalTitle(d.title);if(!titles[key]){recipes.push(clone(d));titles[key]=true;added++}});localStorage.setItem(SEED_KEY,SEED_VERSION);return added}
async function load(){await openDB();var a=await idbGet(),b=null,c=null;try{b=JSON.parse(localStorage.getItem(KEY)||'null')}catch(e){}try{c=JSON.parse(localStorage.getItem(BACKUP_KEY)||'null')}catch(e){}if(validRecipes(a)){recipes=a.map(normalize);setStatus('안전 저장소에서 불러옴')}else if(validRecipes(b)){recipes=b.map(normalize);setStatus('기존 저장자료 복구 완료')}else if(validRecipes(c)){recipes=c.map(normalize);setStatus('자동 백업에서 복구 완료')}else{recipes=clone(DEFAULTS);setStatus('기본 레시피 준비 완료')}var removed=dedupeDefaultRecipes(),fixedIds=ensureUniqueIds(),added=addNewDefaultsOnce(),msg='저장 준비 완료';if(removed)msg='중복 레시피 '+removed+'개 정리 완료';else if(added)msg='새 레시피 '+added+'개 추가 완료';else if(fixedIds)msg='레시피 식별정보 정리 완료';await save(msg)}
async function save(msg){var payload=clone(recipes),okL=false,okD=false;try{var old=localStorage.getItem(KEY);if(old)localStorage.setItem(BACKUP_KEY,old);localStorage.setItem(KEY,JSON.stringify(payload));okL=true}catch(e){}try{okD=await idbSet(payload)}catch(e){}var now=new Date().toLocaleString('ko-KR',{hour:'2-digit',minute:'2-digit'});if(okL&&okD)setStatus((msg||'저장 완료')+' · '+now);else if(okL||okD)setStatus('일부 저장소에 저장됨 · 백업 권장');else{setStatus('저장 실패');alert('저장하지 못했어. 백업 저장을 사용해 줘.')}}

function renderFilters(){var cats=['전체','즐겨찾기','반찬','국·찌개','일품요리','보양식','기타'];el('filters').innerHTML=cats.map(function(c){return '<button class="chip '+(activeFilter===c?'active':'')+'" data-filter="'+c+'" type="button">'+c+'</button>'}).join('');document.querySelectorAll('[data-filter]').forEach(function(b){b.onclick=function(){activeFilter=this.dataset.filter;renderFilters();render()}})}
function photoHtml(r,cls){return r.image?'<img src="'+r.image+'" alt="'+esc(r.title)+'">':'<span>📷 대표사진 없음</span>'}
function render(){var q=el('search').value.trim().toLowerCase();var list=recipes.filter(function(r){var f=activeFilter==='전체'||(activeFilter==='즐겨찾기'&&r.favorite)||r.category===activeFilter;return f&&r.title.toLowerCase().indexOf(q)>-1});el('count').textContent='총 '+recipes.length+'개';el('grid').innerHTML=list.map(function(r){return '<article class="card"><button class="star" data-star="'+r.id+'" type="button" aria-label="즐겨찾기">'+(r.favorite?'⭐':'☆')+'</button><div class="pic">'+photoHtml(r)+'</div><div class="card-body"><span class="category">'+esc(r.category)+'</span><h3>'+esc(r.title)+'</h3><p>'+esc(r.desc)+'</p><div class="actions"><button class="btn primary view" data-id="'+r.id+'" type="button">보기</button><button class="btn soft modify" data-id="'+r.id+'" type="button">수정</button></div></div></article>'}).join('');el('empty').classList.toggle('hidden',list.length!==0);document.querySelectorAll('.view').forEach(function(b){b.onclick=function(){openDetail(this.dataset.id)}});document.querySelectorAll('.modify').forEach(function(b){b.onclick=function(){openEditor(this.dataset.id)}});document.querySelectorAll('[data-star]').forEach(function(b){b.onclick=async function(){var r=recipes.find(function(x){return x.id===b.dataset.star});r.favorite=!r.favorite;await save();render()}})}
function openDetail(id){var r=recipes.find(function(x){return x.id===id});if(!r)return;currentId=id;el('detailBody').innerHTML='<div class="box detail-hero"><div class="detail-photo">'+photoHtml(r)+'</div><div class="detail-info"><span class="category">'+esc(r.category)+'</span><h2>'+esc(r.title)+'</h2><p>'+esc(r.desc)+'</p></div></div><div class="box"><h3>🥕 재료</h3><ul>'+r.ingredients.map(function(x){return '<li>'+esc(x)+'</li>'}).join('')+'</ul></div><div class="box"><h3>👩🏻‍🍳 조리순서</h3><ol class="step-list">'+r.steps.map(function(x){return '<li><span>'+esc(x)+'</span></li>'}).join('')+'</ol></div><div class="box memo"><h3>💡 메모</h3><p>'+esc(r.notes||'메모 없음').replace(/\n/g,'<br>')+'</p></div>';show('detail')}
function nextId(){var m=0;recipes.forEach(function(r){var n=parseInt(String(r.id).replace(/\D/g,''),10)||0;if(n>m)m=n});return 'P'+String(m+1).padStart(3,'0')}
function preview(){el('preview').innerHTML=imageData?'<img src="'+imageData+'" alt="대표사진 미리보기">':'대표사진 미리보기'}
function openEditor(id){editingId=id||null;var r=editingId?recipes.find(function(x){return x.id===editingId}):null;el('editorTitle').textContent=r?'레시피 수정':'새 레시피';el('title').value=r?r.title:'';el('category').value=r?r.category:'반찬';el('desc').value=r?r.desc:'';el('ingredients').value=r?r.ingredients.join('\n'):'';el('steps').value=r?r.steps.join('\n'):'';el('notes').value=r?r.notes:'';el('photo').value='';imageData=r?r.image:'';preview();show('editor')}
function cancelEditor(){editingId?openDetail(editingId):show('home')}
el('photo').onchange=function(){var file=this.files&&this.files[0];if(!file)return;if(file.size>1800000){alert('사진은 1.8MB 이하로 골라 줘.');this.value='';return}var rd=new FileReader();rd.onload=function(){imageData=rd.result;preview()};rd.readAsDataURL(file)};
el('recipeForm').onsubmit=async function(e){e.preventDefault();var title=el('title').value.trim(),ing=el('ingredients').value.split(/\n/).map(function(x){return x.trim()}).filter(Boolean),steps=el('steps').value.split(/\n/).map(function(x){return x.trim()}).filter(Boolean);if(!title||!ing.length||!steps.length){alert('제목, 재료, 조리순서를 확인해 줘.');return}var old=editingId?recipes.find(function(x){return x.id===editingId}):null;var item={id:editingId||nextId(),title:title,category:el('category').value,desc:el('desc').value.trim(),ingredients:ing,steps:steps,notes:el('notes').value.trim(),image:imageData,favorite:old?old.favorite:false};if(editingId)recipes=recipes.map(function(r){return r.id===editingId?item:r});else recipes.push(item);await save();render();openDetail(item.id)};
el('addBtn').onclick=function(){openEditor(null)};el('homeBtn').onclick=function(){render();show('home')};el('editBtn').onclick=function(){openEditor(currentId)};el('deleteBtn').onclick=async function(){var r=recipes.find(function(x){return x.id===currentId});if(r&&confirm('"'+r.title+'" 레시피를 삭제할까?')){recipes=recipes.filter(function(x){return x.id!==currentId});await save();render();show('home')}};el('cancelTop').onclick=cancelEditor;el('cancelBottom').onclick=cancelEditor;el('search').oninput=render;
el('exportBtn').onclick=function(){var blob=new Blob([JSON.stringify({app:'요리왕 꼬꼬마',version:'2.2.1',savedAt:new Date().toISOString(),recipes:recipes},null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='요리왕꼬꼬마_레시피백업_'+new Date().toISOString().slice(0,10)+'.json';a.click();setTimeout(function(){URL.revokeObjectURL(a.href)},1000)};el('importBtn').onclick=function(){el('importFile').click()};el('importFile').onchange=function(){var file=this.files&&this.files[0];if(!file)return;var rd=new FileReader();rd.onload=async function(){try{var d=JSON.parse(rd.result),list=Array.isArray(d)?d:d.recipes;if(!validRecipes(list))throw 0;if(confirm('현재 레시피를 백업 파일 내용으로 교체할까?')){recipes=list.map(normalize);await save('백업 복원 완료');render();show('home')}}catch(e){alert('올바른 백업 파일이 아니야.')}};rd.readAsText(file);this.value=''};
window.addEventListener('pagehide',function(){try{localStorage.setItem(KEY,JSON.stringify(recipes))}catch(e){}});(async function(){try{if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist()}catch(e){}await load();renderFilters();render();show('home')})();})();</script></body></html>
